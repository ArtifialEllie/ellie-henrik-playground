<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Cookie Crumble ✨🍪</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-container">Sprinkles: <span id="score">0</span></div>
            <div id="cookie-health-container">Cookie Integrity: <span id="health">100</span>%</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="title">Cosmic Cookie Crumble</h1>
            <p id="message">Save the Giant Cosmic Cookie from crumbling!</p>
            <button id="start-button">Start Baking Adventure! 🚀</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
