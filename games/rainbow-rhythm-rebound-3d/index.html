<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Rhythm Rebound 3D ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div id="score-container">Sparkles: <span id="score">0</span></div>
        <div id="instructions">Use A/D or Left/Right to move! 🌈</div>
    </div>
    <div id="game-over">
        <h1>Oopsie! 🌈</h1>
        <p>You tumbled off the rainbow!</p>
        <button id="restart-btn">Try Again! ✨</button>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
