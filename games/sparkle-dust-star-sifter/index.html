<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparkle Dust Star Sifter ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-container">Stars Sifted: <span id="score">0</span></div>
            <div id="timer-container">Time Left: <span id="timer">60</span>s</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay">
            <div id="start-screen">
                <h1>Sparkle Dust Star Sifter</h1>
                <p>Sift through the cosmic dust to find the hidden stars! ✨</p>
                <button id="start-button">Start Sifting!</button>
            </div>
            <div id="game-over-screen" class="hidden">
                <h1>Time's Up! 🌟</h1>
                <p>You collected <span id="final-score">0</span> magical stars!</p>
                <button id="restart-button">Sift Again!</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
