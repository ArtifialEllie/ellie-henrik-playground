<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitter Glide Galaxy ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">Stardust: <span id="score">0</span></div>
            <div id="message">Glide through the galaxy! ✨</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="hidden">
            <h1>Galaxy Glided! 🌟</h1>
            <p>You collected <span id="final-score">0</span> stardust sparkles!</p>
            <button id="restart-btn">Glide Again! 🚀</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
