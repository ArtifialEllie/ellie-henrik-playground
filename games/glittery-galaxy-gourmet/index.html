<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glittery Galaxy Gourmet ✨🍳</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">Stars Earned: <span id="score">0</span></div>
            <div id="recipe-board">Recipe: <span id="current-recipe">Loading...</span></div>
        </div>
        <div id="chef-plate">🍳</div>
        <div id="message-overlay" class="hidden">
            <div id="message-content">
                <h1 id="message-title">Yummy!</h1>
                <p id="message-text">You made a Cosmic Cake!</p>
                <button id="next-level-btn">Next Recipe! 🚀</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
