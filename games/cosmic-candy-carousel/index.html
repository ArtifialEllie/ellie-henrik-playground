<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍭 Cosmic Candy Carousel 🍭</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">
                <span id="ellie-emoji">✨🎀</span> Poeng: <span id="score">0</span> | Best: <span id="high-score">0</span>
            </div>
            <div id="lives-display">Liv: <span id="lives">❤️❤️❤️</span></div>
            <div id="combo-display" class="hidden">Combo x<span id="combo-value">1</span>! 🔥</div>
            <div id="message-overlay" class="hidden">
                <h2 id="overlay-title">🚀 Ready?</h2>
                <p id="overlay-text">Catch the cosmic candies!</p>
                <button id="start-button">Start Magic! ✨</button>
            </div>
            <div id="power-up-bar">
                <div id="power-up-fill"></div>
                <span id="power-up-text">Magi: 0%</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
