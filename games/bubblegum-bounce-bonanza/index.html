<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubblegum Bounce Bonanza! 🍬🎈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Sugar Sparkles: 0</div>
            <div id="lives">Bubbles: ❤️❤️❤️</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="overlay-title">Bubblegum Bounce Bonanza!</h1>
            <p id="overlay-text">Collect the sparkles, avoid the sticky traps!</p>
            <button id="start-button">Start Bouncing! ✨</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
