<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Pastel Pancake Flip! 🥞✨</title>
    <style>
        :root {
            --bg-color: #fff9c4;
            --primary-pink: #ffc1e3;
            --primary-blue: #b3e5fc;
            --primary-purple: #e1bee7;
            --primary-green: #c8e6c9;
            --text-color: #5d4037;
            --accent-gold: #ffd700;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            color: var(--text-color);
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 2px white;
        }
        #combo-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-pink);
            z-index: 10;
            text-shadow: 2px 2px white;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }
        #combo-ui.show {
            opacity: 1;
            transform: scale(1.2);
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #fff9c4, #ffe0b2);
            cursor: pointer;
        }
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 30px;
            border: 5px solid var(--primary-pink);
            text-align: center;
            z-index: 20;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn {
            background-color: var(--primary-pink);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-size: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover { 
            transform: scale(1.1); 
            background-color: #f06292;
        }
        h1 { color: var(--primary-pink); }
        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            font-size: 24px;
            color: var(--primary-pink);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 15;
            text-shadow: 2px 2px white;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="game-ui">
        <div>Sabel: <span id="score">0</span> 🥞</div>
        <div>Beste: <span id="highscore">0</span> 🏆</div>
    </div>
    <div id="combo-ui">COMBO x<span id="combo-val">0</span> ✨</div>
    
    <div id="overlay">
        <h1 id="status-text">Oi! Det falt! 🌸</h1>
        <p id="final-score">Du stablet 0 pannekaker!</p>
        <button class="btn" onclick="resetGame()">Prøv igjen! ✨</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const comboEl = document.getElementById('combo-ui');
        const comboValEl = document.getElementById('combo-val');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const finalScoreEl = document.getElementById('final-score');

        let score = 0;
        let combo = 0;
        let highscore = localStorage.getItem('pancakeFlipHighscore') || 0;
        let gameActive = true;
        let canvasWidth, canvasHeight;
        
        highscoreEl.innerText = highscore;

        const pancakeColors = ['#ffc1e3', '#b3e5fc', '#e1bee7', '#c8e6c9', '#fff59d', '#ffccbc'];
        const toppings = ['🍓', '🫐', '🍯', '🧈', '✨', '🌸'];

        function resize() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let stack = [];
        let activePancake = null;
        let particles = [];
        let slideDirection = 1;
        let slideSpeed = 3;
        let currentTotalLean = 0;

        class Pancake {
            constructor(x, y, color, topping = null, width = 120) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = 20;
                this.color = color;
                this.topping = topping;
                this.vy = 0;
                this.vx = 0;
                this.rotation = 0;
                this.vr = 0;
                this.isFlipping = false;
                this.scaleY = 1;
            }

            update() {
                if (this.isFlipping) {
                    this.y += this.vy;
                    this.x += this.vx;
                    this.vy += 0.5; // Gravity
                    this.rotation += this.vr;
                } else if (this.y > canvasHeight - 100 && !stack.includes(this)) {
                    this.x += slideSpeed * slideDirection;
                    if (this.x <= 0 || this.x + this.width >= canvasWidth) {
                        slideDirection *= -1;
                    }
                }
                this.scaleY += (1 - this.scaleY) * 0.2;
            }

            draw(offsetX = 0) {
                ctx.save();
                ctx.translate(this.x + this.width/2 + offsetX, this.y + this.height/2);
                ctx.rotate(this.rotation);
                ctx.scale(1, this.scaleY);
                
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();

                if (this.topping) {
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.topping, 0, -this.height/2 + 5);
                }
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, isSyrup = false) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.isSyrup = isSyrup;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1.0;
                this.radius = isSyrup ? Math.random() * 4 + 2 : Math.random() * 3 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.isSyrup ? 0.1 : 0;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function initStack() {
            stack = [];
            currentTotalLean = 0;
            const startX = canvasWidth / 2 - 60;
            const startY = canvasHeight - 50;
            stack.push(new Pancake(startX, startY, pancakeColors[0]));
            spawnActivePancake();
        }

        function spawnActivePancake() {
            const color = pancakeColors[Math.floor(Math.random() * pancakeColors.length)];
            const topping = toppings[Math.floor(Math.random() * toppings.length)];
            const sizeReduction = Math.min(40, stack.length * 2);
            const currentWidth = 120 - sizeReduction;

            activePancake = new Pancake(0, canvasHeight - 80, color, topping, currentWidth);
            activePancake.isFlipping = false;
        }

        function flipPancake() {
            if (!gameActive || activePancake.isFlipping) return;
            activePancake.isFlipping = true;
            activePancake.vy = -15; 
            activePancake.vx = (Math.random() - 0.5) * 1;
            activePancake.vr = (Math.random() - 0.5) * 0.1;
        }

        function showFloatingText(text, x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function checkLanding() {
            if (!activePancake || !activePancake.isFlipping) return;

            const last = stack[stack.length - 1];
            // Calculate where the last pancake is visually (including lean)
            const visualLastX = last.x + currentTotalLean;

            if (activePancake.vy > 0 && activePancake.y >= last.y - 20) {
                // Check overlap against the visual position of the top pancake
                const overlap = Math.min(activePancake.x + activePancake.width, visualLastX + last.width) - 
                                Math.max(activePancake.x, visualLastX);
                
                if (overlap > 40) {
                    activePancake.isFlipping = false;
                    activePancake.vy = 0;
                    activePancake.vx = 0;
                    activePancake.rotation = 0;
                    activePancake.scaleY = 0.6;

                    // Relative center difference for lean calculation
                    const centerDiff = (activePancake.x + activePancake.width/2) - (visualLastX + last.width/2);
                    currentTotalLean += centerDiff * 0.1;
                    
                    // Snap to the visual position
                    activePancake.x = visualLastX + (overlap - activePancake.width)/2;
                    
                    stack.push(activePancake);
                    score++;
                    scoreEl.innerText = score;
                    
                    if (Math.abs(centerDiff) < 10) {
                        combo++;
                        showFloatingText("PERFECT! ✨", activePancake.x + activePancake.width/2, activePancake.y);
                        if (combo > 1) {
                            comboEl.classList.add('show');
                            comboValEl.innerText = combo;
                        }
                    } else {
                        combo = 0;
                        comboEl.classList.remove('show');
                    }
                    
                    slideSpeed += 0.2;
                    createPopEffect(activePancake.x + activePancake.width/2, activePancake.y, activePancake.color);
                    spawnActivePancake();
                } else {
                    gameOver();
                }
            }
        }

        function createPopEffect(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(x, y, '#fbc02d', true));
            }
        }

        function gameOver() {
            gameActive = false;
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('pancakeFlipHighscore', highscore);
                highscoreEl.innerText = highscore;
                statusText.innerText = "NY REKORD! 🎉";
            } else {
                statusText.innerText = "Oi! Det falt! 🌸";
            }
            finalScoreEl.innerText = `Du stablet ${score} pannekaker!`;
            overlay.style.display = 'block';
        }

        function resetGame() {
            score = 0;
            combo = 0;
            slideSpeed = 3;
            scoreEl.innerText = '0';
            comboEl.classList.remove('show');
            gameActive = true;
            overlay.style.display = 'none';
            particles = [];
            initStack();
        }

        function update() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.ellipse(canvasWidth/2, canvasHeight - 30, 200, 40, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255, 193, 227, 0.5)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(0, canvasHeight - 100);
            ctx.lineTo(canvasWidth, canvasHeight - 100);
            ctx.stroke();
            ctx.setLineDash([]);

            let cumulativeLean = 0;
            stack.forEach((p, index) => {
                if (index > 0) {
                    const prev = stack[index-1];
                    const centerDiff = (p.x + p.width/2) - (prev.x + prev.width/2);
                    cumulativeLean += centerDiff * 0.1;
                }
                p.draw(cumulativeLean);
            });
            
            if (Math.abs(cumulativeLean) > 150) {
                gameOver();
            }
            
            if (activePancake) {
                activePancake.update();
                activePancake.draw();
                checkLanding();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(update);
        }

        window.addEventListener('mousedown', flipPancake);
        window.addEventListener('touchstart', (e) => {
            flipPancake();
            e.preventDefault();
        }, { passive: false });

        initStack();
        update();
    </script>
</body>
</html>
