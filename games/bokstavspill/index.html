<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokstav- og Lyd-eventyret 🦄</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen">
        <h1>Bokstav- og Lyd-eventyret 🦄</h1>
        <p style="font-size: 1.5rem;">Klar for å lære lyder?</p>
        <button id="start-btn">START SPILLET! 🌟</button>
        <button id="gallery-btn" style="font-size: 1.5rem; padding: 10px 30px; border-radius: 30px; border: none; background: #fff; color: #ff69b4; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #ddd;">Min Samling 🦄</button>
    </div>

    <h1>Bokstav- og Lyd-eventyret 🦄</h1>
    
    <div id="game-container">
        <div id="level-up-banner">NIVÅ OPPHØYD! 🎉</div>

    <div id="status-bar">
        <span id="level-text">Nivå: 1 (Enkel)</span>
        <span id="stars-text">Stjerner: 0 ⭐</span>
        <span id="streak-text">Streak: 0 🔥</span>
        <button id="home-btn" class="home-btn">🏠</button>
    </div>

    <div id="badges-container" class="badges-container"></div>

        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="button-row">
            <button class="repeat-btn" onclick="speakPrompt()">🔊</button>
            <button id="hint-btn" class="hint-btn">💡 Hint</button>
        </div>
        <div id="prompt">Hvilken lyd hører du?</div>
        
        <div id="letter-grid"></div>

        <div id="result"></div>
        <div id="animal-name"></div>

        <div id="collection-overlay" class="collection-overlay">
            <button id="close-gallery-btn" class="close-btn">✖</button>
            <div id="collection" class="collection-container"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
