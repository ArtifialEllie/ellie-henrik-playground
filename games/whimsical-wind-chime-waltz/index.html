<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whimsical Wind Chime Waltz ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Melody Points: 0</div>
            <div id="message">Listen to the wind...</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="start-screen">
            <h1>Whimsical Wind Chime Waltz</h1>
            <p>Touch the chimes to create a magical melody!</p>
            <button id="start-button">Begin the Waltz 🌈</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
