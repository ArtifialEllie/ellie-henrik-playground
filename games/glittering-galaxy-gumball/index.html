<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍬 Glittering Galaxy Gumball 🍬</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">
                ✨ Poeng: <span id="score">0</span> | ❤️ Liv: <span id="lives">3</span> | 🏆 Best: <span id="high-score">0</span>
            </div>
            <div id="message">Fang de magiske gummikulene! 🌈</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="hidden">
            <div id="game-over">
                <h1>Spillet er slutt! 💫</h1>
                <p>Du samlet <span id="final-score">0</span> glitrende kuler!</p>
                <button id="restart-btn">Prøv igjen! 🚀</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
