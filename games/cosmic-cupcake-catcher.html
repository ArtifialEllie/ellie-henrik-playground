<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Cosmic Cupcake Catcher 🧁✨</title>
    <style>
        :root {
            --space-bg: #2d1b4e;
            --shield-color: #a2ffdf;
            --pastel-pink: #ffb7ce;
            --pastel-blue: #b2e2f2;
            --pastel-purple: #d1b3ff;
            --pastel-yellow: #fff9b1;
            --text-color: #ffffff;
            --accent-gold: #ffd700;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--space-bg);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            color: var(--text-color);
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-shadow: 2px 2px #ff69b4;
        }
        #combo-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid var(--pastel-pink);
            border-radius: 15px;
            overflow: hidden;
            z-index: 10;
        }
        #combo-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--pastel-pink), var(--accent-gold));
            transition: width 0.2s;
        }
        #combo-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px #ff69b4;
            z-index: 11;
        }
        canvas {
            display: block;
            background: radial-gradient(circle at center, #4b307a 0%, #2d1b4e 100%), 
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="50" cy="50" r="1" fill="white" opacity="0.3"/></svg>');
            cursor: none;
        }
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 30px;
            border: 5px solid var(--pastel-pink);
            text-align: center;
            z-index: 20;
            display: none;
            box-shadow: 0 10px 30px rgba(255, 183, 206, 0.5);
            color: var(--space-bg);
        }
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 27, 78, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            text-align: center;
            color: white;
            backdrop-filter: blur(5px);
        }
        #start-overlay h1 {
            color: var(--pastel-pink);
            font-size: 3rem;
            text-shadow: 0 0 20px var(--pastel-pink);
        }
        .btn {
            background-color: var(--pastel-pink);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-size: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 20px;
        }
        .btn:hover { 
            transform: scale(1.1); 
            background-color: #ff8da1;
        }
        h1 { color: #ff69b4; margin-top: 0; }
        .magnet-alert {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: var(--accent-gold);
            text-shadow: 2px 2px #ff69b4;
            display: none;
            z-index: 10;
            animation: bounce 0.5s infinite alternate;
        }
        .combo-text {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 30px;
            color: var(--pastel-yellow);
            text-shadow: 2px 2px #ff69b4;
            z-index: 10;
        }
.crit-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            font-size: 24px;
            color: var(--pastel-yellow);
            animation: floatUp 0.6s ease-out forwards;
            z-index: 15;
            text-shadow: 2px 2px #ff69b4;
}
@keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
}
        @keyframes bounce {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-10px); }
        }
    </style>
</head>
<body>
    <div id="game-ui">
        <div>Kaker: <span id="score">0</span> 🧁</div>
        <div>Beste: <span id="highscore">0</span> 🏆</div>
    </div>
    <div id="combo-container">
        <div id="combo-bar"></div>
        <div id="combo-text"></div>
    </div>
    
    <div id="magnet-alert" class="magnet-alert">MAGISK MAGNET! ✨🧲</div>
    <div id="shield-alert" class="magnet-alert">SKJOLD AKTIVERT! 🛡️</div>
    <div id="superbowl-alert" class="magnet-alert">SUPER-BOWL AKTIVERT! 🌟🥣</div>

    <div id="overlay">
        <h1 id="status-text">Kosmisk Kaos! 🌌</h1>
        <p id="final-score">Du fanget 0 kaker!</p>
        <button class="btn" onclick="resetGame()">Prøv igjen! ✨</button>
    </div>

    <div id="start-overlay">
        <h1>Kosmisk Kake-kaos! 🧁✨</h1>
        <p>Fang kaker, unngå steiner!</p>
        <button class="btn" id="start-btn">Start Spill! 🚀</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const finalScoreEl = document.getElementById('final-score');
        const magnetAlert = document.getElementById('magnet-alert');
        const shieldAlert = document.getElementById('shield-alert');
        const superBowlAlert = document.getElementById('superbowl-alert');
        const comboContainer = document.getElementById('combo-container');
        const comboBar = document.getElementById('combo-bar');
        const comboText = document.getElementById('combo-text');

        let score = 0;
        let combo = 0;
        let comboTimer = 0;
        let highscore = localStorage.getItem('cosmicCupcakeHighscore') || 0;
        let gameActive = false;
        let canvasWidth, canvasHeight;
        let magnetActive = false;
        let magnetTimer = 0;
        let shieldActive = false;
        let slowMoActive = false;
        let slowMoTimer = 0;
        let screenShake = 0;
        let playerScale = 1;
        let superBowlActive = false;
        let superBowlTimer = 0;

        highscoreEl.innerText = highscore;

        const cupcakeColors = ['#ffb7ce', '#b2e2f2', '#d1b3ff', '#fff9b1', '#a5d6a7', '#ffccf9'];
        const starColors = ['#ffffff', '#ffd700', '#ff69b4', '#b2e2f2'];

        function resize() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        let player = {
            x: canvasWidth / 2,
            y: canvasHeight - 80,
            width: 100,
            height: 60,
            color: '#ff69b4'
        };

let items = [];
let particles = [];
let stars = [];
let nebulae = [];

const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvasWidth,
                y: Math.random() * canvasHeight,
                size: Math.random() * 2,
                opacity: Math.random(),
                blinkSpeed: 0.01 + Math.random() * 0.02
            });
        }

        for (let i = 0; i < 5; i++) {
            nebulae.push({
                x: Math.random() * canvasWidth,
                y: Math.random() * canvasHeight,
                radius: 200 + Math.random() * 300,
                color: Math.random() > 0.5 ? 'rgba(90, 50, 168, 0.2)' : 'rgba(178, 226, 242, 0.1)',
                vx: (Math.random() - 0.5) * 0.2,
                vy: (Math.random() - 0.5) * 0.2,
            });
        }

        class Item {
            constructor() {
                this.radius = 20;
                this.x = Math.random() * (canvasWidth - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.baseSpeed = 2 + Math.random() * 3 + (score / 50);
                this.speed = this.baseSpeed;
                
                const rand = Math.random();
                if (rand > 0.95) {
                    this.type = 'gold';
                    this.color = '#ffd700';
                    this.emoji = '🌟';
                } else if (rand > 0.90) {
                    this.type = 'shield';
                    this.color = '#a2ffdf';
                    this.emoji = '🛡️';
                } else if (rand > 0.85) {
                    this.type = 'slowmo';
                    this.color = '#b2e2f2';
                    this.emoji = '❄️';
                } else if (rand < 0.15) {
                    this.type = 'rock';
                    this.color = '#888';
                    this.emoji = '🌑';
                } else {
                    this.type = 'normal';
                    this.color = cupcakeColors[Math.floor(Math.random() * cupcakeColors.length)];
                    this.emoji = '🧁';
                }
            }

            update() {
                if (magnetActive) {
                    const dx = player.x - this.x;
                    this.x += dx * 0.05;
                }
                this.speed = slowMoActive ? this.baseSpeed * 0.4 : this.baseSpeed;
                this.y += this.speed;
            }

            draw() {
                ctx.save();
                ctx.font = `${this.radius * 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                if (this.type === 'gold') {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'gold';
                }
                ctx.fillText(this.emoji, this.x, this.y);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 3 + 1;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1.0;
                ctx.closePath();
            }
        }

        function spawnItem() {
            if (!gameActive) return;
            items.push(new Item());
            setTimeout(spawnItem, Math.max(400, 1000 - (score * 5)));
        }

        function createBurst(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function handleMove(e) {
            const mouseX = (e.clientX || (e.touches && e.touches[0].clientX));
            if (mouseX) {
                player.x = mouseX;
            }
        }

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, { passive: false });

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            if (screenShake > 0) {
                ctx.save();
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                screenShake *= 0.9;
                if (screenShake < 0.1) screenShake = 0;
            }

            nebulae.forEach(n => {
                n.x += n.vx;
                n.y += n.vy;
                if (n.x < -n.radius) n.x = canvasWidth + n.radius;
                if (n.x > canvasWidth + n.radius) n.x = -n.radius;
                if (n.y < -n.radius) n.y = canvasHeight + n.radius;
                if (n.y > canvasHeight + n.radius) n.y = -n.radius;
                
                let grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
                grad.addColorStop(0, n.color);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            stars.forEach(s => {
                s.opacity += s.blinkSpeed;
                if (s.opacity > 1 || s.opacity < 0) s.blinkSpeed *= -1;
                ctx.globalAlpha = Math.abs(s.opacity);
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            if (magnetActive) {
                magnetTimer--;
                if (magnetTimer <= 0) {
                    magnetActive = false;
                    magnetAlert.style.display = 'none';
                }
            }

            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    combo = 0;
                    comboText.innerText = '';
                    comboBar.style.width = '0%';
                }
            }

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.scale(playerScale, playerScale);
            
            const playerGrad = ctx.createLinearGradient(0, 0, 0, player.height);
            playerGrad.addColorStop(0, player.color);
            playerGrad.addColorStop(1, '#c2185b');
            ctx.fillStyle = playerGrad;

            ctx.beginPath();
            ctx.arc(0, 0, player.width/2, 0, Math.PI, false);
            ctx.fill();
            
            ctx.strokeStyle = superBowlActive ? 'gold' : 'white';
            ctx.lineWidth = 4;
            if (superBowlActive) {
                ctx.lineWidth = 8;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'gold';
            }
            ctx.beginPath();
            ctx.ellipse(0, 0, player.width/2, 10, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-15, 5, 8, 0, Math.PI * 2);
            ctx.arc(15, 5, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff69b4';
            ctx.beginPath();
            ctx.arc(0, 5, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();

            if (screenShake > 0) ctx.restore();

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.update();
                item.draw();

                const dx = item.x - player.x;
                const dy = item.y - player.y;
                const dist = Math.hypot(dx, dy);

                if (dist < 50) {
                    if (item.type === 'normal') {
                        combo++;
                        comboTimer = 60;
                        const multiplier = Math.floor(combo / 5) + 1;
                        score += multiplier;
                        
                        comboText.innerText = `COMBO x${multiplier}! ✨`;
                        if (multiplier > 2) {
                            const crit = document.createElement('div');
                            crit.className = 'crit-text';
                            crit.innerText = `+${multiplier} ✨`;
                            crit.style.left = item.x + 'px';
                            crit.style.top = item.y + 'px';
                            document.body.appendChild(crit);
                            setTimeout(() => crit.remove(), 600);
                        }
                        const progress = Math.min(100, (combo % 5) * 20);
                        comboBar.style.width = `${progress}%`;
                        
                        playSound(440 + (combo * 20), 'sine', 0.1);
                        createBurst(item.x, item.y, item.color);
                        playerScale = 1.2;
                        if (combo % 10 === 0 && combo > 0) {
                            activateSuperBowl();
                        }
                    } else if (item.type === 'gold') {
                        score += 5;
                        activateMagnet();
                        playSound(880, 'square', 0.2);
                        createBurst(item.x, item.y, 'gold');
                        playerScale = 1.3;
                    } else if (item.type === 'shield') {
                        shieldActive = true;
                        shieldAlert.style.display = 'block';
                        playSound(600, 'triangle', 0.3);
                        createBurst(item.x, item.y, item.color);
                        playerScale = 1.2;
                    } else if (item.type === 'slowmo') {
                        activateSlowMo();
                        playSound(300, 'sine', 0.4);
                        createBurst(item.x, item.y, item.color);
                        playerScale = 1.2;
                    } else if (item.type === 'rock') {
                        if (shieldActive) {
                            shieldActive = false;
                            shieldAlert.style.display = 'none';
                            playSound(200, 'sine', 0.2);
                            createBurst(item.x, item.y, 'white');
                            playerScale = 1.2;
                        } else {
                            screenShake = 20;
                            playSound(100, 'sawtooth', 0.5);
                            gameOver();
                        }
                    }
                    scoreEl.innerText = score;
                    items.splice(i, 1);
                    continue;
                }

                if (item.y > canvasHeight + item.radius) {
                    items.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            playerScale += (1 - playerScale) * 0.2;
            if (superBowlActive) {
                superBowlTimer--;
                if (superBowlTimer <= 0) {
                    superBowlActive = false;
                    superBowlAlert.style.display = 'none';
                }
            }

            requestAnimationFrame(update);
        }

        function activateMagnet() {
            magnetActive = true;
            magnetTimer = 300;
            magnetAlert.style.display = 'block';
        }

        function activateSlowMo() {
            slowMoActive = true;
            slowMoTimer = 300; 
            setTimeout(() => { slowMoActive = false; }, 5000);
        }

        function activateSuperBowl() {
            superBowlActive = true;
            superBowlTimer = 300; 
            superBowlAlert.style.display = 'block';
            playSound(1000, 'sine', 0.5);
            createBurst(player.x, player.y, 'white');
        }

        function gameOver() {
            gameActive = false;
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('cosmicCupcakeHighscore', highscore);
                highscoreEl.innerText = highscore;
                statusText.innerText = "NY REKORD! 🎉";
            } else {
                statusText.innerText = "Kosmisk Kaos! 🌌";
            }
            finalScoreEl.innerText = `Du fanget ${score} kaker!`;
            overlay.style.display = 'block';
        }

        function resetGame() {
            score = 0;
            combo = 0;
            comboTimer = 0;
            comboText.innerText = '';
            comboBar.style.width = '0%';
            scoreEl.innerText = '0';
            items = [];
            particles = [];
            gameActive = false;
            overlay.style.display = 'none';
            document.getElementById('start-overlay').style.display = 'flex';
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-overlay').style.display = 'none';
            gameActive = true;
            spawnItem();
        });

        requestAnimationFrame(update);
    </script>
</body>
</html>
