<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Cosmos ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div id="score-container">
            <span id="score-label">Crystals Collected:</span>
            <span id="score">0</span>
            <span id="combo-container" style="margin-left: 20px; display: none;">
                Combo: <span id="combo">1</span>x
            </span>
        </div>
        <div id="message">Touch the crystals to bring light to the cosmos! 🌟</div>
    </div>
    <div id="canvas-container"></div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
