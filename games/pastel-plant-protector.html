<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Pastel Plant Protector! 🌸</title>
    <style>
        :root {
            --bg-color: #fdfcf0;
            --primary-pink: #ffb7ce;
            --primary-blue: #a2d2ff;
            --primary-green: #bdfcc9;
            --primary-purple: #cbb1ff;
            --text-color: #6d5d6e;
            --accent-yellow: #fff4bd;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 70vh;
            background: linear-gradient(to bottom, #e0f7fa 0%, #fdfcf0 100%);
            border: 8px solid var(--primary-pink);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><text y="20" font-size="20">💧</text></svg>'), auto;
            overflow: hidden;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 10;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            border: 3px solid var(--primary-blue);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .game-object {
            position: absolute;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.1s;
            animation: bounce 2s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
        }

        .game-object:active {
            transform: scale(0.8);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: fadeOut 0.6s forwards;
            font-size: 1.5rem;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.5); }
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .title {
            font-size: 3rem;
            color: var(--primary-pink);
            margin-bottom: 10px;
            text-shadow: 2px 2px white;
        }

        .description {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .btn {
            background-color: var(--primary-pink);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 10px 0 #e087a5;
        }

        .btn:hover {
            transform: scale(1.1);
            background-color: #ff8da9;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #e087a5;
        }

        .hidden {
            display: none !important;
        }

        .flower-bloom {
            animation: bloom 0.5s forwards;
        }

        @keyframes bloom {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px; text-align: center;">
        <h1 style="color: var(--primary-pink); font-size: 2.5rem; margin: 0;">Ellie's Pastel Plant Protector! 🌸</h1>
        <p style="color: var(--text-color);">Water the flowers, avoid the grumpy weeds! ✨</p>
    </div>

    <div id="game-container">
        <div class="ui-panel">
            <div class="stat-box">Score: <span id="score">0</span></div>
            <div class="stat-box">Lives: <span id="lives">3</span></div>
        </div>

        <div id="overlay">
            <div class="title" id="overlay-title">Welcome! 🌷</div>
            <div class="description" id="overlay-desc">Help Ellie grow a beautiful pastel garden! Click the cute plants to water them, but don't water the grumpy weeds! 💧</div>
            <button class="btn" id="start-btn">Let's Plant! 🚀</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let lives = 3;
        let gameActive = false;
        let spawnRate = 1200;
        let spawnTimer;

        const PLANTS = ['🌸', '🌷', '🌻', '🌼', '🌹', '🌺'];
        const WEEDS = ['🌵', '🥀', '🍂', '🍄'];
        const PARTICLES = ['💧', '✨', '💖', '☁️'];

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            container.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function spawnObject() {
            if (!gameActive) return;

            const isPlant = Math.random() > 0.3;
            const obj = document.createElement('div');
            obj.className = 'game-object';
            obj.textContent = isPlant 
                ? PLANTS[Math.floor(Math.random() * PLANTS.length)] 
                : WEEDS[Math.floor(Math.random() * WEEDS.length)];

            const x = Math.random() * (container.clientWidth - 80);
            const y = Math.random() * (container.clientHeight - 120) + 60;
            
            obj.style.left = x + 'px';
            obj.style.top = y + 'px';

            obj.onclick = (e) => {
                if (!gameActive) return;

                const rect = obj.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                createParticle(rect.left - containerRect.left + 30, rect.top - containerRect.top + 30);

                if (isPlant) {
                    score += 10;
                    scoreEl.textContent = score;
                    obj.classList.add('flower-bloom');
                    obj.textContent = '🌸'; // Bloom effect
                    setTimeout(() => obj.remove(), 300);
                } else {
                    lives--;
                    livesEl.textContent = lives;
                    obj.textContent = '💢';
                    if (lives <= 0) {
                        endGame();
                    }
                    setTimeout(() => obj.remove(), 300);
                }
            };

            container.appendChild(obj);

            // Remove if not clicked
            setTimeout(() => {
                if (obj.parentNode) {
                    if (isPlant) {
                        // Maybe lose a life if a plant withers? 
                        // For simplicity, just remove it.
                    }
                    obj.remove();
                }
            }, 2000);

            // Schedule next spawn
            spawnRate = Math.max(500, 1200 - Math.floor(score / 50) * 50);
            spawnTimer = setTimeout(spawnObject, spawnRate);
        }

        function startGame() {
            score = 0;
            lives = 3;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            gameActive = true;
            overlay.classList.add('hidden');
            
            // Clear any existing game objects
            document.querySelectorAll('.game-object').forEach(o => o.remove());
            
            spawnObject();
        }

        function endGame() {
            gameActive = false;
            clearTimeout(spawnTimer);
            overlay.classList.remove('hidden');
            overlayTitle.textContent = "Garden Nap Time! 😴";
            overlayDesc.textContent = `You grew a wonderful garden with ${score} points! Ellie is so proud of you! ✨`;
            startBtn.textContent = "Try Again! 🌸";
        }

        startBtn.onclick = startGame;
    </script>
</body>
</html>
