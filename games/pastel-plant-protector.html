<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Pastel Plant Protector! 🌸</title>
    <style>
        :root {
            --bg-color: #fdfcf0;
            --primary-pink: #ffb7ce;
            --primary-blue: #a2d2ff;
            --primary-green: #bdfcc9;
            --primary-purple: #cbb1ff;
            --text-color: #6d5d6e;
            --accent-yellow: #fff4bd;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 70vh;
            background: linear-gradient(to bottom, #e0f7fa 0%, #fdfcf0 100%);
            border: 8px solid var(--primary-pink);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><text y="20" font-size="20">💧</text></svg>'), auto;
            overflow: hidden;
            transition: transform 0.1s;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 10;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            border: 3px solid var(--primary-blue);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 4px 0 var(--primary-blue);
            transition: transform 0.2s;
        }

        #combo-box {
            position: absolute;
            top: 80px;
            right: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-pink);
            text-shadow: 2px 2px white;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 11;
        }

        .combo-pop {
            animation: comboPop 0.3s ease-out;
        }

        @keyframes comboPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .game-object {
            position: absolute;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.1s;
            animation: bounce 2s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            z-index: 5;
        }

        .game-object:active {
            transform: scale(0.7);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            font-size: 1.5rem;
            z-index: 6;
            transition: transform 0.6s ease-out, opacity 0.6s ease-out;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(4px);
        }

        .title {
            font-size: 3rem;
            color: var(--primary-pink);
            margin-bottom: 10px;
            text-shadow: 2px 2px white;
        }

        .description {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .btn {
            background-color: var(--primary-pink);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 10px 0 #e087a5;
        }

        .btn:hover {
            transform: scale(1.1);
            background-color: #ff8da9;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #e087a5;
        }

        .hidden {
            display: none !important;
        }

        .flower-bloom {
            animation: bloom 0.5s forwards;
        }

        @keyframes bloom {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.2); }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 1;
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { left: -200px; }
            to { left: 100vw; }
        }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px; text-align: center;">
        <h1 style="color: var(--primary-pink); font-size: 2.5rem; margin: 0;">Ellie's Pastel Plant Protector! 🌸</h1>
        <p style="color: var(--text-color);">Water the flowers, avoid the grumpy weeds! ✨</p>
    </div>

    <div id="game-container">
        <div class="ui-panel">
            <div class="stat-box">Score: <span id="score">0</span></div>
            <div class="stat-box">High Score: <span id="high-score">0</span></div>
            <div class="stat-box">Lives: <span id="lives">3</span></div>
        </div>
        <div id="combo-box">Combo x1</div>

        <div id="overlay">
            <div class="title" id="overlay-title">Welcome! 🌷</div>
            <div class="description" id="overlay-desc">Help Ellie grow a beautiful pastel garden! Click the cute plants to water them, but don't water the grumpy weeds! 💧</div>
            <button class="btn" id="start-btn">Let's Plant! 🚀</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const livesEl = document.getElementById('lives');
        const comboBox = document.getElementById('combo-box');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let lives = 3;
        let combo = 0;
        let gameActive = false;
        let spawnRate = 1200;
        let spawnTimer;

        const PLANTS = [
            { emoji: '🌸', value: 10 },
            { emoji: '🌷', value: 10 },
            { emoji: '🌻', value: 15 },
            { emoji: '🌼', value: 10 },
            { emoji: '🌹', value: 20 },
            { emoji: '🌺', value: 15 }
        ]
        const WEEDS = ['🌵', '🥀', '🍂', '🍄', '🕷️', '🕸️'];
        const POWERUPS = ['🌟'];
        const PARTICLES = ['💧', '✨', '💖', '☁️'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playPopSound() {
            playSound(400 + Math.random() * 200, 'sine', 0.2);
        }

        function playBuzzSound() {
            playSound(150 + Math.random() * 50, 'sawtooth', 0.3);
        }

        function playPowerupSound() {
            playSound(600, 'sine', 0.1);
            setTimeout(() => playSound(800, 'sine', 0.1), 100);
            setTimeout(() => playSound(1000, 'sine', 0.2), 200);
        }

        function createCloud() {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            const width = 100 + Math.random() * 100;
            cloud.style.width = width + 'px';
            cloud.style.height = (width / 2) + 'px';
            cloud.style.top = (Math.random() * 40) + '%';
            cloud.style.animationDuration = (15 + Math.random() * 20) + 's';
            cloud.style.animationDelay = (Math.random() * 20) + 's';
            container.appendChild(cloud);
        }

        for(let i=0; i<5; i++) createCloud();

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            container.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const dist = 50 + Math.random() * 50;
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist;

            requestAnimationFrame(() => {
                p.style.transform = `translate(${tx}px, ${ty}px) scale(1.5)`;
                p.style.opacity = '0';
            });

            setTimeout(() => p.remove(), 600);
        }

        function updateCombo() {
            if (combo > 1) {
                comboBox.textContent = `Combo x${combo}!`;
                comboBox.style.opacity = '1';
                comboBox.classList.remove('combo-pop');
                void comboBox.offsetWidth; // Trigger reflow
                comboBox.classList.add('combo-pop');
            } else {
                comboBox.style.opacity = '0';
            }
        }

        function spawnObject() {
            if (!gameActive) return;

            const rand = Math.random();
            let isPlant = true;
            let isPowerup = false;
            let plantData = PLANTS[0];
            let emoji = '';

            if (rand < 0.05) {
                isPlant = false;
                isPowerup = true;
                emoji = POWERUPS[0];
            } else if (rand < 0.3) {
                isPlant = false;
                emoji = WEEDS[Math.floor(Math.random() * WEEDS.length)];
            } else {
                plantData = PLANTS[Math.floor(Math.random() * PLANTS.length)];
                emoji = plantData.emoji;
            }

            const obj = document.createElement('div');
            obj.className = 'game-object';
            obj.textContent = emoji;

            const x = Math.random() * (container.clientWidth - 80);
            const y = Math.random() * (container.clientHeight - 120) + 60;
            
            obj.style.left = x + 'px';
            obj.style.top = y + 'px';

            obj.onclick = (e) => {
                if (!gameActive) return;

                const rect = obj.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                
                for(let i=0; i<5; i++) {
                    createParticle(rect.left - containerRect.left + 40, rect.top - containerRect.top + 40);
                }

                if (isPowerup) {
                    playPowerupSound();
                    // Clear all weeds
                    document.querySelectorAll('.game-object').forEach(o => {
                        if (WEEDS.includes(o.textContent)) {
                            o.textContent = '✨';
                            o.classList.add('flower-bloom');
                            setTimeout(() => o.remove(), 300);
                        }
                    });
                    score += 50;
                    scoreEl.textContent = score;
                    obj.remove();
                } else if (isPlant) {
                    combo++;
                    const points = plantData.value * (1 + Math.floor(combo / 3));
                    score += points;
                    scoreEl.textContent = score;
                    updateCombo();
                    playPopSound();
                    obj.classList.add('flower-bloom');
                    obj.textContent = '🌸';
                    setTimeout(() => obj.remove(), 300);
                } else {
                    combo = 0;
                    updateCombo();
                    lives--;
                    livesEl.textContent = lives;
                    playBuzzSound();
                    
                    container.classList.add('shake');
                    setTimeout(() => container.classList.remove('shake'), 400);
                    
                    obj.textContent = '💢';
                    if (lives <= 0) {
                        endGame();
                    }
                    setTimeout(() => obj.remove(), 200);
                }
            };

            container.appendChild(obj);

            setTimeout(() => {
                if (obj.parentNode) {
                    obj.remove();
                }
            }, 2000);

            spawnRate = Math.max(500, 1200 - Math.floor(score / 100) * 50);
            spawnTimer = setTimeout(spawnObject, spawnRate);
        }

        function updateHighScore() {
            const saved = localStorage.getItem('ellie-plant-highscore') || 0;
            highScoreEl.textContent = saved;
        }

        function startGame() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // Bug Fix: Clear any existing timer
            clearTimeout(spawnTimer);
            
            score = 0;
            lives = 3;
            combo = 0;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            updateCombo();
            gameActive = true;
            overlay.classList.add('hidden');
            
            document.querySelectorAll('.game-object').forEach(o => o.remove());
            
            spawnObject();
        }

        function endGame() {
            gameActive = false;
            clearTimeout(spawnTimer);
            overlay.classList.remove('hidden');
            overlayTitle.textContent = "Garden Nap Time! 😴";
            
            const saved = localStorage.getItem('ellie-plant-highscore') || 0;
            if (score > saved) {
                localStorage.setItem('ellie-plant-highscore', score);
                overlayDesc.textContent = `NEW RECORD! You grew a magnificent garden with ${score} points! Ellie is absolutely dazzled! ✨`;
            } else {
                overlayDesc.textContent = `You grew a wonderful garden with ${score} points! Ellie is so proud of you! ✨`;
            }
            
            updateHighScore();
            startBtn.textContent = "Try Again! 🌸";
        }

        startBtn.onclick = startGame;
        updateHighScore();
    </script>
</body>
</html>
