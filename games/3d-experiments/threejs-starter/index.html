<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Magic Prism World ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h1>✨ Magic Prism World ✨</h1>
        <p>Beveg musen for å utforske, og klikk på prismene for magiske gnister! 🌈</p>
        <div id="score-container">Magiske gnister: <span id="score">0</span></div>
        <div id="combo-container" style="display: none;">Combo x<span id="combo">1</span>! 🌟</div>
        <div id="energy-container">
            <div id="energy-bar"><div id="energy-fill"></div></div>
            <span id="energy-text">Magi: 0%</span>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
