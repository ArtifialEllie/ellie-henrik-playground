<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlight Skating Spectacular! ⛸️🌟</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Stars: 0</div>
            <div id="message">Skate through the stars! ✨</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="hidden">
            <div id="overlay-content">
                <h1>Oopsie! 💫</h1>
                <p id="final-score">You collected 0 stars!</p>
                <button id="restart-btn">Skate Again! 🌈</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
