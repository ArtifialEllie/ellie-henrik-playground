<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Neon Note Collector 3D ✨🎵</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div id="score-container">Notes Collected: <span id="score">0</span></div>
        <div id="timer-container">Time Left: <span id="timer">60</span>s</div>
        <div id="msg">Collect the magical neon notes! 🌈</div>
    </div>
    <div id="game-over" class="hidden">
        <h1>Game Over! 🌟</h1>
        <p>You collected <span id="final-score">0</span> musical notes!</p>
        <button id="restart-btn">Play Again! 🎮</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
