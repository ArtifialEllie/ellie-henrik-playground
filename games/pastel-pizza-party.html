<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Pastel Pizza Party! 🍕✨</title>
    <style>
        :root {
            --primary: #ffb7ce;
            --secondary: #b2e2f2;
            --accent: #fdfd96;
            --bg: #fffafa;
            --text: #5d5d5d;
            --success: #c1f0c1;
            --error: #ffcccb;
        }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #fffafa 0%, #ffe4e1 100%);
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .stat-box {
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: 4px solid var(--primary);
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #request-box {
            background: white;
            padding: 15px 30px;
            border-radius: 30px;
            border: 6px dashed var(--primary);
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .ingredient {
            position: absolute;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.1s;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
            user-select: none;
        }
        .ingredient:hover {
            transform: scale(1.2);
        }
        .pop-text {
            position: absolute;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 20;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        #start-screen, #end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 2rem;
            cursor: pointer;
            border: none;
            font-family: inherit;
            box-shadow: 0 8px 0 #ff8da1;
            transition: all 0.1s;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #ff8da1;
        }
        h1 {
            font-size: 4rem;
            color: var(--primary);
            text-shadow: 3px 3px 0 white, 6px 6px 0 var(--secondary);
            margin-bottom: 20px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="stat-box">Score: <span id="score">0</span></div>
            <div id="request-box">Loading... 🍕</div>
            <div class="stat-box">Time: <span id="timer">60</span>s</div>
        </div>

        <div id="start-screen">
            <h1>Ellie's Pastel Pizza Party! 🍕✨</h1>
            <p style="font-size: 1.5rem; max-width: 600px; margin-bottom: 30px;">
                Welcome to the most whimsical pizzeria! 🌸<br>
                Click the ingredients that match the request to make a magical pizza!
            </p>
            <button class="btn" onclick="startGame()">Let's Cook! 👩‍🍳</button>
        </div>

        <div id="end-screen" class="hidden">
            <h1>Party's Over! 🥳</h1>
            <p style="font-size: 2rem; margin-bottom: 20px;">You made <span id="final-score">0</span> magical slices!</p>
            <button class="btn" onclick="location.reload()">Play Again! 🔄</button>
        </div>
    </div>

    <script>
        const ingredients = [
            { emoji: '🌸', name: 'Pink Pepperoni' },
            { emoji: '🍄', name: 'Blue Mushroom' },
            { emoji: '🍍', name: 'Yellow Pineapple' },
            { emoji: '🌿', name: 'Minty Basil' },
            { emoji: '🍅', name: 'Ruby Tomato' },
            { emoji: '🧀', name: 'Golden Cheese' }
        ];

        let score = 0;
        let timeLeft = 60;
        let currentRequest = null;
        let gameActive = false;
        let spawnTimer = null;
        let countdownTimer = null;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const requestEl = document.getElementById('request-box');
        const gameContainer = document.getElementById('game-container');

        function getRandomIngredient() {
            return ingredients[Math.floor(Math.random() * ingredients.length)];
        }

        function setRequest() {
            currentRequest = getRandomIngredient();
            requestEl.innerText = `Need: ${currentRequest.emoji} ${currentRequest.name}!`;
            requestEl.style.borderColor = 'var(--primary)';
        }

        function createIngredient() {
            if (!gameActive) return;

            const ing = getRandomIngredient();
            const el = document.createElement('div');
            el.className = 'ingredient';
            el.innerText = ing.emoji;
            
            // Random starting position (off-screen)
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 100;
            el.style.left = startX + 'px';
            el.style.top = startY + 'px';

            // Animation properties
            const duration = 3000 + Math.random() * 3000;
            const drift = (Math.random() - 0.5) * 200;

            gameContainer.appendChild(el);

            const animation = el.animate([
                { top: startY + 'px', left: startX + 'px' },
                { top: '-100px', left: (startX + drift) + 'px' }
            ], {
                duration: duration,
                easing: 'linear'
            });

            animation.onfinish = () => el.remove();

            el.onclick = () => {
                if (!gameActive) return;
                
                if (ing.emoji === currentRequest.emoji) {
                    score += 10;
                    scoreEl.innerText = score;
                    showPop('YUM! 🌟', el.offsetLeft, el.offsetTop, 'var(--primary)');
                    setRequest();
                    // Burst of confetti effect could go here
                } else {
                    score = Math.max(0, score - 5);
                    scoreEl.innerText = score;
                    showPop('Oops! ☁️', el.offsetLeft, el.offsetTop, 'var(--text)');
                }
                el.remove();
            };
        }

        function showPop(text, x, y, color) {
            const pop = document.createElement('div');
            pop.className = 'pop-text';
            pop.innerText = text;
            pop.style.left = x + 'px';
            pop.style.top = y + 'px';
            pop.style.color = color;
            gameContainer.appendChild(pop);
            setTimeout(() => pop.remove(), 800);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            gameActive = true;
            score = 0;
            timeLeft = 60;
            scoreEl.innerText = score;
            timerEl.innerText = timeLeft;
            
            setRequest();
            
            spawnTimer = setInterval(createIngredient, 800);
            countdownTimer = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnTimer);
            clearInterval(countdownTimer);
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
