<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛳ Glittering Galaxy Golf ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h1>⛳ Glittering Galaxy Golf ✨</h1>
        <div id="game-stats">
            <span>✨ Stjerner: <span id="stars">0</span></span>
            <span>⛳ Hull: <span id="holes">0</span>/5</span>
            <span>🚀 Forsøk: <span id="attempts">0</span></span>
        </div>
        <div id="message" class="hidden">Mål nådd! 🌟</div>
        <div id="instructions">Dra i ballen for å skyte den mot det kosmiske hullet! 🌈</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
