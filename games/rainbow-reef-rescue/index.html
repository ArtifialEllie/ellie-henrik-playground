<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Reef Rescue! 🐠✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
    <div id="ui">
        <div id="score">Pearls: 0</div>
        <div id="combo-container" style="display: none;">
            <div id="combo">Combo: x1</div>
        </div>
        <div id="rescued">Friends Rescued: 0</div>
        <div id="level">Level: 1</div>
        <div id="highscore">Best: 0</div>
    </div>
    <div id="boss-ui" style="display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100;">
        <div style="color: white; font-weight: bold; text-shadow: 2px 2px #000; margin-bottom: 5px;">BOSS: GIGANTIC GRUMPY GULPER! 🐡</div>
        <div id="boss-health-bar" style="width: 300px; height: 20px; background: #444; border: 3px solid white; border-radius: 10px; overflow: hidden;">
            <div id="boss-health-fill" style="width: 100%; height: 100%; background: linear-gradient(to right, #ff4444, #ff8888); transition: width 0.3s;"></div>
        </div>
    </div>
        <button id="pause-btn" onclick="togglePause()" style="position: absolute; top: 10px; right: 10px; z-index: 100; padding: 10px 20px; font-size: 1rem;">Pause ⏸️</button>
        <div id="powerup-hud"></div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="title">Rainbow Reef Rescue!</h1>
            <p id="message">Save your shimmering sea friends from the grumpy urchins!</p>
            <button id="start-btn">Dive In! 🌊</button>
        </div>
    </div>
    <script src="game.js"></script>
    <script src="missing_entities.js"></script>
    <script src="boss_logic.js"></script>
</body>
</html>
