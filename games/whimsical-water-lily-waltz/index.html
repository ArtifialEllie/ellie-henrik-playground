<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whimsical Water Lily Waltz 🐸✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="high-score">Best: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="title">Whimsical Water Lily Waltz</h1>
            <p id="message">Jump from lily to lily! ✨<br>Avoid the grumpy dark lilies! 🐸</p>
            <button id="start-button">Start Waltz! 🌸</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
