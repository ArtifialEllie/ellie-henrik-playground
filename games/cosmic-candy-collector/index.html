<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Candy Collector 🍭✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">Candies: <span id="score">0</span></div>
            <div id="timer-board">Time: <span id="timer">30</span>s</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div id="message-box">
                <h1 id="title">Cosmic Candy Collector</h1>
                <p id="description">Collect as many glowing candies as you can before time runs out! Avoid the grumpy asteroids! 🌌🍬</p>
                <button id="start-button">Start Adventure! ✨</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
