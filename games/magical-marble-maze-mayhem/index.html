<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Marble Maze Mayhem ✨🌀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">✨ Magic Gems: <span id="score">0</span></div>
            <div id="timer">⏳ Time: <span id="time">60</span>s</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="overlay-title">Magical Marble Maze Mayhem</h1>
            <p id="overlay-text">Guide the glowing marble to the portal! Avoid the void-walls!</p>
            <button id="start-button">Start Magic! 🚀</button>
        </div>
        <div id="controls-hint">Use Arrow Keys or WASD to roll! 🎮</div>
    </div>
    <script src="game.js"></script>
</body>
</html>
