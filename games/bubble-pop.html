<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Bubble Pop! 🫧✨</title>
    <style>
        :root {
            --bg-color: #e0f7fa;
            --primary-pink: #ff80ab;
            --primary-blue: #81d4fa;
            --primary-purple: #ce93d8;
            --text-color: #006064;
            --accent-gold: #ffd700;
            --white: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            color: var(--text-color);
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-shadow: 2px 2px white;
        }
        #combo-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid var(--primary-pink);
            border-radius: 15px;
            overflow: hidden;
            z-index: 10;
        }
        #combo-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-pink), var(--accent-gold));
            transition: width 0.2s;
        }
        #combo-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px var(--primary-pink);
            z-index: 11;
        }
        canvas {
            display: block;
            background: linear-gradient(to top, #b2ebf2, #e0f7fa);
            cursor: crosshair;
        }
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 40px;
            border: 8px solid var(--primary-pink);
            text-align: center;
            z-index: 20;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
            max-width: 80%;
        }
        .btn {
            background-color: var(--primary-pink);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-size: 24px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 6px 0 #f06292;
            font-weight: bold;
        }
        .btn:hover { 
            transform: scale(1.1); 
            background-color: #f06292;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #f06292;
        }
        h1 { 
            color: var(--primary-pink); 
            font-size: 3rem;
            margin-top: 0;
            text-shadow: 3px 3px white;
        }
        #frenzy-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            color: var(--accent-gold);
            font-weight: bold;
            text-shadow: 4px 4px var(--primary-pink);
            pointer-events: none;
            z-index: 15;
            display: none;
            animation: flash 0.5s infinite alternate;
        }
        @keyframes flash {
            from { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body>
    <div id="game-ui">
        <div>Popp: <span id="score">0</span> 🫧</div>
        <div>Tid: <span id="timer">30</span>s ⏰</div>
        <div>Beste: <span id="highscore">0</span> 🏆</div>
    </div>
    
    <div id="combo-container">
        <div id="combo-bar"></div>
        <div id="combo-text"></div>
    </div>
    <div id="frenzy-alert">BOBBEL-FEST! 🌈</div>
    
    <div id="overlay">
        <h1 id="status-text">Tid er ute! 🌸</h1>
        <p id="final-score" style="font-size: 1.5rem; margin-bottom: 30px;">Du poppet 0 bobler!</p>
        <button class="btn" onclick="resetGame()">Spill igjen! ✨</button>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const highscoreEl = document.getElementById('highscore');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const finalScoreEl = document.getElementById('final-score');
        const comboContainer = document.getElementById('combo-container');
        const comboBar = document.getElementById('combo-bar');
        const comboText = document.getElementById('combo-text');
        const frenzyAlert = document.getElementById('frenzy-alert');
        
        let score = 0;
        let timeLeft = 30;
        let highscore = localStorage.getItem('bubblePopHighscore') || 0;
        let gameActive = true;
        let canvasWidth, canvasHeight;
        let timerInterval;
        let spawnTimeout;
        let combo = 0;
        let comboTimer;
        let isFrenzy = false;

        highscoreEl.innerText = highscore;

        const colors = ['#ff80ab', '#81d4fa', '#ce93d8', '#b39ddb', '#fff59d', '#a5d6a7'];

        // Audio Setup
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playPopSound(isGold = false, isStinky = false) {
            if (isGold) {
                playSound(600, 'sine', 0.2);
                setTimeout(() => playSound(800, 'sine', 0.2), 100);
            } else if (isStinky) {
                playSound(150, 'sawtooth', 0.3);
            } else {
                playSound(400 + Math.random() * 400, 'sine', 0.1);
            }
        }

        function resize() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        let bubbles = [];
        let particles = [];
        let floatingTexts = [];

        class Bubble {
            constructor(frenzy = false) {
                this.radius = Math.random() * 30 + 20;
                this.x = Math.random() * (canvasWidth - this.radius * 2) + this.radius;
                this.y = canvasHeight + this.radius;
                this.speed = (Math.random() * 2 + 1) * (frenzy ? 1.5 : 1);
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.vx = (Math.random() - 0.5) * 2;
                this.pulse = 0;
                this.pulseDir = 1;
                
                this.type = 'normal';
                const rand = Math.random();
                if (rand > 0.92) {
                    this.type = 'gold';
                    this.color = '#ffd700';
                } else if (rand < 0.08) {
                    this.type = 'stinky';
                    this.color = '#9e9e9e';
                }
            }

            update() {
                this.y -= this.speed;
                this.x += this.vx;
                
                if (this.x - this.radius < 0 || this.x + this.radius > canvasWidth) {
                    this.vx *= -1;
                }

                this.pulse += 0.05 * this.pulseDir;
                if (this.pulse > 1 || this.pulse < 0) this.pulseDir *= -1;
            }

            draw() {
                const currentRadius = this.radius + this.pulse * 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                
                let grad = ctx.createRadialGradient(
                    this.x - currentRadius * 0.3, this.y - currentRadius * 0.3, currentRadius * 0.1,
                    this.x, this.y, currentRadius
                );
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                grad.addColorStop(0.3, this.color);
                grad.addColorStop(1, this.color);
                
                ctx.fillStyle = grad;
                ctx.globalAlpha = 0.7;
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
                ctx.closePath();

                if (this.type === 'gold') {
                    ctx.font = `${currentRadius}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.fillText('✨', this.x, this.y + currentRadius/3);
                } else if (this.type === 'stinky') {
                    ctx.font = `${currentRadius}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.fillText('💨', this.x, this.y + currentRadius/3);
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12;
                this.radius = Math.random() * 4 + 1;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // Gravity
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1.0;
                ctx.closePath();
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.life = 1.0;
                this.vy = -2;
            }
            update() {
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.font = 'bold 24px Comic Sans MS';
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        function spawnBubble() {
            if (!gameActive) return;
            
            bubbles.push(new Bubble(isFrenzy));
            
            let nextSpawn = Math.max(200, 600 - (score * 2));
            if (isFrenzy) nextSpawn /= 3;
            
            spawnTimeout = setTimeout(spawnBubble, nextSpawn);
        }

        function triggerFrenzy() {
            isFrenzy = true;
            frenzyAlert.style.display = 'block';
            setTimeout(() => {
                isFrenzy = false;
                frenzyAlert.style.display = 'none';
            }, 5000);
        }

        function updateCombo() {
            if (combo > 1) {
                comboText.innerText = `Combo x${combo}`;
                comboText.style.opacity = '1';
                const progress = Math.min(100, (combo % 10) * 10);
                comboBar.style.width = `${progress}%`;
            } else {
                comboText.style.opacity = '0';
                comboBar.style.width = '0%';
            }
            
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                combo = 0;
                updateCombo();
            }, 1500);
        }

        function handlePop(e) {
            if (!gameActive) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const mouseY = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                const dist = Math.hypot(mouseX - b.x, mouseY - b.y);
                
                if (dist < b.radius + 10) {
                    createPopEffect(b.x, b.y, b.color);
                    
                    if (b.type === 'gold') {
                        playPopSound(true, false);
                        const bonus = 5 + (combo * 2);
                        score += bonus;
                        timeLeft += 2;
                        floatingTexts.push(new FloatingText(b.x, b.y, `+${bonus} TIME! ✨`, 'gold'));
                    } else if (b.type === 'stinky') {
                        playPopSound(false, true);
                        score = Math.max(0, score - 5);
                        combo = 0;
                        comboBar.style.width = '0%';
                        comboText.innerText = '';
                        floatingTexts.push(new FloatingText(b.x, b.y, `-5 💨`, '#666'));
                        document.body.classList.add('shake');
                        setTimeout(() => document.body.classList.remove('shake'), 400);
                    } else {
                        playPopSound();
                        combo++;
                        const points = Math.ceil(60 / b.radius * 2) + (combo > 5 ? 5 : 0);
                        score += points;
                        floatingTexts.push(new FloatingText(b.x, b.y, `+${points}`, b.color));
                    }
                    
                    if (Math.random() < 0.03) triggerFrenzy();
                    
                    updateCombo();
                    scoreEl.innerText = score;
                    bubbles.splice(i, 1);
                    break;
                }
            }
        }

        function createPopEffect(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                bubbles[i].draw();
                if (bubbles[i].y < -bubbles[i].radius) {
                    bubbles.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].update();
                floatingTexts[i].draw();
                if (floatingTexts[i].life <= 0) {
                    floatingTexts.splice(i, 1);
                }
            }

            requestAnimationFrame(update);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    gameOver();
                }
            }, 1000);
        }

        function gameOver() {
            gameActive = false;
            clearInterval(timerInterval);
            clearTimeout(spawnTimeout);
            
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('bubblePopHighscore', highscore);
                highscoreEl.innerText = highscore;
                statusText.innerText = "NY REKORD! 🎉";
            } else {
                statusText.innerText = "Tid er ute! 🌸";
            }
            
            finalScoreEl.innerText = `Du poppet ${score} bobler!`;
            overlay.style.display = 'block';
        }

        function resetGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            comboBar.style.width = '0%';
            comboText.innerText = '';
            scoreEl.innerText = '0';
            timerEl.innerText = '30';
            bubbles = [];
            particles = [];
            floatingTexts = [];
            gameActive = true;
            overlay.style.display = 'none';
            comboText.style.opacity = '0';
            
            clearInterval(timerInterval);
            clearTimeout(spawnTimeout);
            
            startTimer();
            spawnBubble();
        }

        window.addEventListener('mousedown', handlePop);
        window.addEventListener('touchstart', (e) => {
            handlePop(e);
            e.preventDefault();
        }, { passive: false });

        // Initialize
        spawnBubble();
        startTimer();
        update();
    </script>
</body>
</html>
