<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelly Jam Jump! 🌈✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="high-score">Best: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1>Jelly Jam Jump!</h1>
            <p>Jump on the jammy platforms to go higher!</p>
            <p>Use <b>Arrow Keys</b> or <b>A/D</b> to move.</p>
            <button id="start-btn">Start Bouncing! 🍮</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
