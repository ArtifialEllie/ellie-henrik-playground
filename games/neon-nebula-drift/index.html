<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Nebula Drift 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="high-score">Best: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1>Neon Nebula Drift</h1>
            <p>Drift through the nebula! Avoid the cosmic debris!</p>
            <p>Use <b>Arrow Keys</b> or <b>WASD</b> to move.</p>
            <button id="start-btn">Start Drifting! ✨</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
