<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Magic Memory Match ✨</title>
    <style>
        :root {
            --primary: #ffb6c1; /* Light Pink */
            --secondary: #add8e6; /* Light Blue */
            --accent: #e6e6fa; /* Lavender */
            --bg: #fffafa; /* Snow */
            --text: #6b5b95;
            --card-back: #ffc0cb;
            --success: #98fb98;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text);
            text-shadow: 2px 2px var(--primary);
            margin-bottom: 10px;
        }

        .stats {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            perspective: 1000px;
            max-width: 500px;
            width: 90%;
        }

        .card {
            aspect-ratio: 1/1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: match-bounce 0.5s ease forwards;
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        .card-front {
            background-color: var(--card-back);
            color: white;
            font-size: 2rem;
        }

        .card-back {
            background-color: white;
            transform: rotateY(180deg);
        }

        @keyframes match-bounce {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); opacity: 0.8; }
        }

        .btn {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 1.1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.5);
        }

        .btn:hover {
            transform: scale(1.1);
            background-color: #ff8da1;
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid var(--primary);
            text-align: center;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .win-message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: sparkle-fade 1s forwards;
        }

        @keyframes sparkle-fade {
            0% { opacity: 1; transform: scale(0) rotate(0deg); }
            100% { opacity: 0; transform: scale(1.5) rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>Ellie's Magic Memory Match ✨</h1>
    
    <div class="stats">
        <span>Moves: <span id="moves">0</span></span>
        <span>Matches: <span id="matches">0</span>/8</span>
    </div>

    <div class="game-container" id="grid"></div>

    <button class="btn" onclick="initGame()">Start New Game! 🌸</button>

    <div class="win-message" id="win-message">
        <h2>You did it! 🌟</h2>
        <p>Your magic memory is amazing!</p>
        <button class="btn" onclick="closeWinMessage()">Play Again! 🦄</button>
    </div>

    <script>
        const emojis = ['🌸', '🦄', '🍭', '🎀', '⭐️', '🎨', '🧁', '🐱'];
        let cards = [];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let isLockBoard = false;

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards = [...emojis, ...emojis];
            shuffle(cards);
            
            moves = 0;
            matches = 0;
            flippedCards = [];
            isLockBoard = false;
            updateStats();

            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                
                card.innerHTML = `
                    <div class="card-face card-front">✨</div>
                    <div class="card-face card-back">${emoji}</div>
                `;
                
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function flipCard() {
            if (isLockBoard) return;
            if (this === flippedCards[0]) return;
            if (this.classList.contains('matched')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLockBoard = true;
            moves++;
            updateStats();

            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.emoji === card2.dataset.emoji;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            flippedCards.forEach(card => {
                card.classList.add('matched');
                createSparkles(card);
            });
            matches++;
            updateStats();
            resetBoard();
            
            if (matches === emojis.length) {
                showWinMessage();
            }
        }

        function unflipCards() {
            setTimeout(() => {
                flippedCards.forEach(card => card.classList.remove('flipped'));
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            flippedCards = [];
            isLockBoard = false;
        }

        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matches;
        }

        function createSparkles(card) {
            const rect = card.getBoundingClientRect();
            for (let i = 0; i < 6; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.textContent = '✨';
                sparkle.style.left = (rect.left + Math.random() * rect.width) + 'px';
                sparkle.style.top = (rect.top + Math.random() * rect.height) + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        function showWinMessage() {
            setTimeout(() => {
                document.getElementById('win-message').classList.add('show');
                startConfetti();
            }, 500);
        }

        function closeWinMessage() {
            document.getElementById('win-message').classList.remove('show');
            initGame();
        }

        function startConfetti() {
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-10px';
                    confetti.style.backgroundColor = ['#ffb6c1', '#add8e6', '#e6e6fa', '#ffd700', '#98fb98'][Math.floor(Math.random() * 5)];
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    
                    const animation = confetti.animate([
                        { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                        { transform: `translate(${Math.random() * 100 - 50}px, 105vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                    ], {
                        duration: Math.random() * 3000 + 2000,
                        easing: 'linear'
                    });
                    
                    document.body.appendChild(confetti);
                    animation.onfinish = () => confetti.remove();
                }, i * 20);
            }
        }

        initGame();
    </script>
</body>
</html>
