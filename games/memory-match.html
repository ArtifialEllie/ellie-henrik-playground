<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Magic Memory Palace ✨🏰</title>
    <style>
        :root {
            --primary: #ffb6c1;
            --secondary: #add8e6;
            --accent: #e6e6fa;
            --bg: #fffafa;
            --text: #6b5b95;
            --card-back: #ffc0cb;
            --success: #98fb98;
            --gold: #ffd700;
            --palace-pink: #fce4ec;
            --palace-border: #f06292;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--accent) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            transition: background-color 1s ease;
        }

        .palace-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            border: 8px double var(--palace-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            max-width: 90vw;
        }

        h1 {
            font-size: 3rem;
            color: var(--text);
            text-shadow: 3px 3px var(--primary);
            margin: 0 0 10px 0;
            animation: float 3s ease-in-out infinite;
            text-align: center;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .stats {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            gap: 25px;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 3px solid var(--primary);
        }

        .game-container {
            display: grid;
            gap: 12px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .card {
            aspect-ratio: 1/1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            width: 80px;
            height: 80px;
        }

        @media (max-width: 600px) {
            .card { width: 60px; height: 60px; }
        }

        .card:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .card.flipped {
            transform: rotateY(180deg) scale(1.05);
        }

        .card.matched {
            animation: match-bounce 0.6s ease forwards;
            cursor: default;
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            border: 4px solid white;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .card-front {
            background-color: var(--card-back);
            color: white;
            font-size: 2rem;
            text-shadow: 1px 1px rgba(0,0,0,0.1);
        }

        .card-back {
            background-color: white;
            transform: rotateY(180deg);
        }

        @keyframes match-bounce {
            0% { transform: rotateY(180deg) scale(1); }
            30% { transform: rotateY(180deg) scale(1.2); }
            50% { transform: rotateY(180deg) scale(0.9); }
            70% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); opacity: 0.8; }
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.3rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 6px 0 #f06292;
        }

        .btn:hover {
            transform: scale(1.1);
            background-color: #ff8da1;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #f06292;
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 40px;
            border-radius: 40px;
            border: 10px solid var(--primary);
            text-align: center;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .win-message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            pointer-events: none;
            z-index: 110;
        }

        .sparkle {
            position: absolute;
            font-size: 1.8rem;
            pointer-events: none;
            animation: sparkle-fade 1s forwards;
            z-index: 120;
        }

        @keyframes sparkle-fade {
            0% { opacity: 1; transform: scale(0) rotate(0deg); }
            100% { opacity: 0; transform: scale(1.5) rotate(360deg); }
        }

        .star-rating {
            font-size: 2rem;
            color: var(--gold);
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="palace-container">
        <h1 id="game-title">Magic Memory Palace ✨</h1>
        
        <div class="stats">
            <span>Level: <span id="level">1</span></span>
            <span>Trekk: <span id="moves">0</span></span>
            <span>Par: <span id="matches">0</span>/<span id="total-pairs">0</span></span>
        </div>

        <div class="game-container" id="grid"></div>

        <button class="btn" id="reset-btn" onclick="initGame()">Start på nytt! 🌸</button>
    </div>

    <div class="win-message" id="win-message">
        <h2 id="win-title">Du klarte det! 🌟</h2>
        <div class="star-rating" id="star-rating">⭐⭐⭐</div>
        <p id="final-stats">Din magiske hukommelse er fantastisk!</p>
        <button class="btn" id="next-btn" onclick="nextLevel()">Neste Nivå! 🦄</button>
    </div>

    <script>
        const levelConfigs = [
            {
                name: "Søte Godterier 🍭",
                grid: 2,
                emojis: ['🍭', '🧁', '🍩', '🍦'],
                bg: '#fffafa',
                accent: '#ffb6c1'
            },
            {
                name: "Magisk Skog 🍄",
                grid: 4,
                emojis: ['🌸', '🦄', '🍄', '🧚', '🦋', '🌟', '🌙', '🌿'],
                bg: '#f0fff0',
                accent: '#98fb98'
            },
            {
                name: "Kosmisk Drøm 🌌",
                grid: 6,
                emojis: ['🚀', '🪐', '🌌', '☀️', '☄️', '🛸', '🔭', '🛰️', '🌍', '🌓', '🌟', '🌑', '🌠', '🌀', '💎', '🔮', '🌈', '🎆'],
                bg: '#f0faff',
                accent: '#add8e6'
            }
        ];

        let currentLevelIdx = 0;
        let cards = [];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let isLockBoard = false;

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();

        function playSound(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function initGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const config = levelConfigs[currentLevelIdx];
            document.body.style.backgroundColor = config.bg;
            document.documentElement.style.setProperty('--accent', config.accent);
            document.getElementById('game-title').innerText = config.name;
            document.getElementById('level').textContent = currentLevelIdx + 1;
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${config.grid}, 1fr)`;
            
            cards = [...config.emojis, ...config.emojis];
            shuffle(cards);
            
            moves = 0;
            matches = 0;
            flippedCards = [];
            isLockBoard = false;
            
            document.getElementById('total-pairs').textContent = config.emojis.length;
            updateStats();

            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                
                card.innerHTML = `
                    <div class="card-face card-front">✨</div>
                    <div class="card-face card-back">${emoji}</div>
                `;
                
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function flipCard() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (isLockBoard) return;
            if (this === flippedCards[0]) return;
            if (this.classList.contains('matched')) return;

            playSound(440, 'sine', 0.1);
            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLockBoard = true;
            moves++;
            updateStats();

            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.emoji === card2.dataset.emoji;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            playSound(660, 'sine', 0.2);
            setTimeout(() => playSound(880, 'sine', 0.2), 100);
            
            flippedCards.forEach(card => {
                card.classList.add('matched');
                createSparkles(card);
            });
            matches++;
            updateStats();
            resetBoard();
            
            if (matches === levelConfigs[currentLevelIdx].emojis.length) {
                showWinMessage();
            }
        }

        function unflipCards() {
            setTimeout(() => {
                playSound(220, 'sine', 0.2);
                flippedCards.forEach(card => card.classList.remove('flipped'));
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            flippedCards = [];
            isLockBoard = false;
        }

        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matches;
        }

        function createSparkles(card) {
            const rect = card.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.textContent = '✨';
                sparkle.style.left = (rect.left + Math.random() * rect.width) + 'px';
                sparkle.style.top = (rect.top + Math.random() * rect.height) + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        function showWinMessage() {
            const config = levelConfigs[currentLevelIdx];
            const maxMoves = config.emojis.length * 2.5;
            let stars = "⭐";
            if (moves <= config.emojis.length) stars = "⭐⭐⭐";
            else if (moves <= maxMoves) stars = "⭐⭐";

            setTimeout(() => {
                document.getElementById('star-rating').innerText = stars;
                document.getElementById('final-stats').innerText = `Du fant alle parene på ${moves} trekk! 🌟`;
                document.getElementById('win-message').classList.add('show');
                startConfetti();
                playSound(523.25, 'sine', 0.5);
                setTimeout(() => playSound(659.25, 'sine', 0.5), 150);
                setTimeout(() => playSound(783.99, 'sine', 0.5), 300);
                
                if (currentLevelIdx === levelConfigs.length - 1) {
                    document.getElementById('win-title').innerText = "Mester av Palasset! 🏰";
                    document.getElementById('next-btn').innerText = "Spill igjen! 🦄";
                } else {
                    document.getElementById('win-title').innerText = "Nivå Fullført! 🌟";
                    document.getElementById('next-btn').innerText = "Neste Nivå! 🦄";
                }
            }, 500);
        }

        function nextLevel() {
            document.getElementById('win-message').classList.remove('show');
            if (currentLevelIdx < levelConfigs.length - 1) {
                currentLevelIdx++;
            } else {
                currentLevelIdx = 0;
            }
            initGame();
        }

        function startConfetti() {
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-10px';
                    confetti.style.backgroundColor = ['#ffb6c1', '#add8e6', '#e6e6fa', '#ffd700', '#98fb98', '#ffc0cb'][Math.floor(Math.random() * 6)];
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    
                    const animation = confetti.animate([
                        { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                        { transform: `translate(${Math.random() * 100 - 50}px, 105vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                    ], {
                        duration: Math.random() * 3000 + 2000,
                        easing: 'linear'
                    });
                    
                    document.body.appendChild(confetti);
                    animation.onfinish = () => confetti.remove();
                }, i * 15);
            }
        }

        initGame();
    </script>
</body>
</html>
