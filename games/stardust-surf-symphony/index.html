<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Surf Symphony ✨🏄‍♀️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">Notes Collected: <span id="score">0</span></div>
            <div id="message">Press Space or Tap to Jump! 🎵</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="hidden">
            <h1>Symphony Finished! 🌟</h1>
            <p>You collected <span id="final-score">0</span> magical notes!</p>
            <button id="restart-btn">Surf Again! 🌈</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
