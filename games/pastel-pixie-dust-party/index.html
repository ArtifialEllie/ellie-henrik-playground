<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Pixie Dust Party ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">Dust Collected: <span id="score">0</span></div>
            <div id="timer-board">Time Left: <span id="timer">60</span>s</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div id="start-screen">
                <h1>Pastel Pixie Dust Party ✨</h1>
                <p>Collect the sparkling pixie dust and avoid the grumpy grey clouds!</p>
                <p>Use your mouse or touch to move the Pixie!</p>
                <button id="start-button">Start the Party! 🌈</button>
            </div>
            <div id="game-over-screen" class="hidden">
                <h1>Party's Over! 💖</h1>
                <p>You collected <span id="final-score">0</span> bits of magic dust!</p>
                <button id="restart-button">Play Again! ✨</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
