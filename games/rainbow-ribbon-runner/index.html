<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Ribbon Runner ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Stars: 0</div>
            <div id="high-score">Best: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1>Rainbow Ribbon Runner</h1>
            <p>Collect the stars! Avoid the grey blocks!</p>
            <p>Use <b>Arrow Keys</b> or <b>WASD</b> to move</p>
            <button id="start-btn">Start Magic! 🌈</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
