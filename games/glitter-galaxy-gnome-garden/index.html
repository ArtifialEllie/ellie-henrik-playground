<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitter Galaxy Gnome Garden ✨🍄</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Glitter Galaxy Gnome Garden</h1>
            <div id="stats">
                <div class="stat">✨ Shimmer: <span id="shimmer-count">0</span></div>
                <div class="stat">🍄 Gnomes: <span id="gnome-count">0</span></div>
            </div>
        </header>

        <div id="garden-grid">
            <!-- Garden plots will be generated by JS -->
        </div>

        <div id="controls">
            <button id="plant-btn" class="magic-btn">Plant Glitter-Seed 🌱</button>
            <button id="water-btn" class="magic-btn">Sprinkle Stardust 🌟</button>
        </div>

        <div id="message-box">Welcome to your cosmic garden! Plant some seeds to start growing gnomes! ✨</div>
    </div>
    <script src="game.js"></script>
</body>
</html>
