<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Nebula Navigator ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="lives">Lives: ❤️❤️❤️</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div id="message">
                <h1>Neon Nebula Navigator</h1>
                <p>Navigate through the nebula, collect stardust, and avoid space debris!</p>
                <p>Use Arrow Keys or WASD to move.</p>
                <button id="start-btn">Start Journey ✨</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
