<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Cave Collector ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Krystaller: 0</div>
            <div id="timer">Tid: 60</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div id="message">
                <h1>Velkommen til Krystallgrotten! 💎</h1>
                <p>Samle så mange magiske krystaller du kan før tiden renner ut!</p>
                <p>Bruk piltastene eller WASD for å bevege deg.</p>
                <button id="start-btn">Start Eventyret! ✨</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
