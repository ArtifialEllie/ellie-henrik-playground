<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Cloud Cuddle ✨☁️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Stars Cuddled: 0</div>
            <div id="message">Cuddle the stars! Avoid the grumpy clouds! 💖</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="hidden">
            <h1>Dreamy End! 🌙</h1>
            <p id="final-score">You cuddled 0 stars!</p>
            <button id="restart-btn">Cuddle Again! ✨</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
