<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamy Doodle Dash ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Stjerner: 0</div>
            <div id="level">Drømmenivå: 1</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div id="msg-box">
                <h1 id="title">Dreamy Doodle Dash ✨</h1>
                <p id="description">Tegn regnbue-broer for å hjelpe den lille stjernen trygt frem til skyen! 🌈⭐</p>
                <button id="start-btn">Begynn eventyret!</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
