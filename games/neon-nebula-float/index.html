<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Nebula Float ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Stardust: 0</div>
            <div id="high-score">Best: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1>Neon Nebula Float</h1>
            <p>Guide your neon jellyfish through the nebula!</p>
            <p>Collect <span class="crystal-text">✨ Stardust Crystals</span></p>
            <p>Avoid <span class="void-text">🌑 Void Bubbles</span></p>
            <button id="start-button">Begin Floating 🌈</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
