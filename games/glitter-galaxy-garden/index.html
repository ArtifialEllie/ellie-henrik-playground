<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitter Galaxy Garden ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <h1>Glitter Galaxy Garden</h1>
            <p>Click the cosmos to plant sparkling stars! ✨</p>
            <div id="score-board">
                Stars Planted: <span id="score">0</span> | 
                Galaxy Level: <span id="level">1</span>
            </div>
            <button id="clear-garden">Clear Garden 🌌</button>
        </div>
        <canvas id="garden-canvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
