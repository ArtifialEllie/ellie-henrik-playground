<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Cupcake Collector ✨🧁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Cupcakes: 0</div>
            <div id="timer">Time: 60</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1>Cosmic Cupcake Collector! 🌈</h1>
            <p>Catch as many magical cupcakes as you can before time runs out!</p>
            <button id="start-btn">Start Magic! ✨</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
