<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Pastel Paraglider 🪂✨</title>
    <style>
        :root {
            --bg-sky: #e0f7fa;
            --sky-bottom: #b2ebf2;
            --primary-pink: #ff80ab;
            --primary-purple: #ce93d8;
            --primary-yellow: #fff59d;
            --text-color: #006064;
            --cloud-gray: #bdbdbd;
            --accent-gold: #ffd700;
            --heart-red: #ff5252;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-sky);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            color: var(--text-color);
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 2px white;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #combo-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-pink);
            z-index: 10;
            text-shadow: 2px 2px white;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: scale(0.8);
        }
        #combo-ui.show {
            opacity: 1;
            transform: scale(1.1);
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, var(--bg-sky), var(--sky-bottom));
            cursor: pointer;
        }
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 30px;
            border: 5px solid var(--primary-pink);
            text-align: center;
            z-index: 20;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }
        .btn {
            background-color: var(--primary-pink);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-size: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 20px;
            box-shadow: 0 6px 0 #f06292;
            font-weight: bold;
        }
        .btn:hover { 
            transform: scale(1.1); 
            background-color: #f06292;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #f06292;
        }
        h1 { color: var(--primary-pink); margin-top: 0; text-shadow: 2px 2px white; }
        .instructions { font-size: 18px; color: #666; margin-bottom: 20px; }
        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            font-size: 24px;
            color: var(--primary-pink);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 15;
            text-shadow: 2px 2px white;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="game-ui">
        <div>Glede: <span id="score">0</span> ✨</div>
        <div>Beste: <span id="highscore">0</span> 🏆</div>
        <div>Liv: <span id="lives">3</span> ❤️</div>
    </div>
    <div id="combo-ui">COMBO x<span id="combo-val">0</span> ✨</div>
    
    <div id="overlay">
        <h1 id="status-text">Oi da! 🌸</h1>
        <p id="final-score">Du samlet 0 gledesgnister!</p>
        <div class="instructions">Hold musen nede eller trykk på skjermen for å fly opp! 🎈</div>
        <button class="btn" onclick="resetGame()">Fly igjen! ✨</button>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const livesEl = document.getElementById('lives');
        const comboUi = document.getElementById('combo-ui');
        const comboValEl = document.getElementById('combo-val');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const finalScoreEl = document.getElementById('final-score');

        let score = 0;
        let combo = 0;
        let comboTimer = 0;
        let lives = 3;
        let highscore = localStorage.getItem('paragliderHighscore') || 0;
        let gameActive = false;
        let canvasWidth, canvasHeight;
        let isPressing = false;
        let screenShake = 0;
        let frameCount = 0;

        highscoreEl.innerText = highscore;

        // Audio Setup
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();
        function playSound(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function resize() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Player {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = 100;
                this.y = canvasHeight / 2;
                this.radius = 20;
                this.velocity = 0;
                this.gravity = 0.25;
                this.lift = -0.6;
                this.angle = 0;
                this.trail = [];
                this.invincible = 0;
            }
            update() {
                if (isPressing) {
                    this.velocity += this.lift;
                } else {
                    this.velocity += this.gravity;
                }
                
                this.velocity *= 0.98;
                this.y += this.velocity;
                this.angle = this.velocity * 0.05;

                if (this.invincible > 0) this.invincible--;

                // Trail logic
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 20) this.trail.shift();

                if (this.y < 0) {
                    this.y = 0;
                    this.velocity = 0;
                }
                if (this.y > canvasHeight) {
                    takeDamage();
                }
            }
            draw() {
                // Draw trail
                ctx.beginPath();
                ctx.moveTo(this.trail[0]?.x, this.trail[0]?.y);
                for(let i=1; i<this.trail.length; i++) {
                    ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }
                ctx.strokeStyle = 'rgba(255, 128, 171, 0.3)';
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.save();
                if (this.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Canopy
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 1.5, Math.PI, 0);
                ctx.fillStyle = '#ff80ab';
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Lines
                ctx.beginPath();
                ctx.moveTo(-this.radius * 1.5, 0);
                ctx.lineTo(0, this.radius);
                ctx.lineTo(this.radius * 1.5, 0);
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.stroke();
                
                // Ellie
                ctx.beginPath();
                ctx.arc(0, this.radius, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.strokeStyle = '#ff80ab';
                ctx.stroke();
                
                // Blushing cheeks
                ctx.beginPath();
                ctx.arc(-4, this.radius + 2, 2, 0, Math.PI * 2);
                ctx.arc(4, this.radius + 2, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffc1e3';
                ctx.fill();
                
                ctx.restore();
            }
        }

        class Obstacle {
            constructor(type) {
                this.type = type; 
                this.x = canvasWidth + 100;
                this.y = Math.random() * (canvasHeight - 100) + 50;
                this.radius = type === 'cloud' ? Math.random() * 40 + 30 : 15;
                this.speed = (Math.random() * 2 + 3) * (1 + score * 0.001);
                this.color = type === 'cloud' ? '#bdbdbd' : '#fff59d';
                this.emoji = type === 'cloud' ? '☁️' : '✨';
                if (type === 'heart') this.emoji = '❤️';
            }
            update() {
                this.x -= this.speed;
            }
            draw() {
                ctx.font = `${this.radius * 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        class BackgroundElement {
            constructor(layer) {
                this.layer = layer; // 1 = far, 2 = mid, 3 = near
                this.reset();
                this.x = Math.random() * canvasWidth;
            }
            reset() {
                this.x = canvasWidth + 100;
                this.y = Math.random() * canvasHeight;
                this.size = (Math.random() * 20 + 10) * (this.layer * 0.5);
                this.speed = (Math.random() * 1 + 0.5) * (this.layer * 0.3);
                this.emoji = ['🌸', '⭐', '☁️', '💖'][Math.floor(Math.random() * 4)];
                this.opacity = (Math.random() * 0.5 + 0.2) / this.layer;
            }
            update() {
                this.x -= this.speed;
                if (this.x < -100) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.emoji, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        const player = new Player();
        let obstacles = [];
        let backgroundElements = [];
        let particles = [];
        
        // Initialize parallax layers
        for(let i=0; i<20; i++) backgroundElements.push(new BackgroundElement(1));
        for(let i=0; i<15; i++) backgroundElements.push(new BackgroundElement(2));
        for(let i=0; i<10; i++) backgroundElements.push(new BackgroundElement(3));

        function spawnObstacle() {
            const rand = Math.random();
            let type = 'cloud';
            if (rand > 0.9) type = 'heart';
            else if (rand > 0.6) type = 'sparkle';
            obstacles.push(new Obstacle(type));
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function showFloatingText(text, x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function takeDamage() {
            if (player.invincible > 0) return;
            
            lives--;
            livesEl.innerText = lives;
            screenShake = 20;
            playSound(150, 'sawtooth', 0.5);
            createExplosion(player.x, player.y, '#ff80ab');
            
            if (lives <= 0) {
                gameOver();
            } else {
                player.invincible = 120; // 2 seconds at 60fps
                player.velocity = -5; // Bounce up
            }
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            frameCount++;

            if (screenShake > 0) {
                ctx.save();
                ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
                screenShake *= 0.9;
                if (screenShake < 0.1) screenShake = 0;
            }

            backgroundElements.forEach(be => {
                be.update();
                be.draw();
            });

            if (frameCount % 60 === 0) {
                spawnObstacle();
            }

            player.update();
            player.draw();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.update();
                obs.draw();

                const dist = Math.hypot(player.x - obs.x, player.y - obs.y);
                if (dist < player.radius + obs.radius * 0.7) {
                    if (obs.type === 'cloud') {
                        takeDamage();
                        if (obs.type === 'cloud') obstacles.splice(i, 1);
                    } else if (obs.type === 'sparkle') {
                        combo++;
                        comboTimer = 60;
                        const points = 1 + Math.floor(combo / 5);
                        score += points;
                        scoreEl.innerText = score;
                        
                        playSound(440 + combo * 20, 'sine', 0.1);
                        createExplosion(obs.x, obs.y, '#fff59d');
                        showFloatingText(`+${points} ✨`, obs.x, obs.y);
                        
                        if (combo > 1) {
                            comboUi.classList.add('show');
                            comboValEl.innerText = combo;
                        }
                        
                        obstacles.splice(i, 1);
                    } else if (obs.type === 'heart') {
                        lives = Math.min(5, lives + 1);
                        livesEl.innerText = lives;
                        playSound(600, 'sine', 0.3);
                        createExplosion(obs.x, obs.y, '#ff5252');
                        showFloatingText("+1 ❤️", obs.x, obs.y);
                        obstacles.splice(i, 1);
                    }
                }

                if (obs.x < -100) {
                    obstacles.splice(i, 1);
                }
            }

            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    combo = 0;
                    comboUi.classList.remove('show');
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            if (screenShake > 0) ctx.restore();
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            playSound(150, 'sawtooth', 0.5);
            createExplosion(player.x, player.y, '#ff80ab');
            
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('paragliderHighscore', highscore);
                highscoreEl.innerText = highscore;
                statusText.innerText = "NY REKORD! 🎉";
            } else {
                statusText.innerText = "Oi da! 🌸";
            }
            
            finalScoreEl.innerText = `Du samlet ${score} gledesgnister!`;
            overlay.style.display = 'block';
        }

        function resetGame() {
            score = 0;
            combo = 0;
            comboTimer = 0;
            lives = 3;
            scoreEl.innerText = '0';
            livesEl.innerText = '3';
            comboUi.classList.remove('show');
            obstacles = [];
            particles = [];
            frameCount = 0;
            player.reset();
            gameActive = true;
            overlay.style.display = 'none';
            update();
        }

        const handleStart = (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!gameActive && overlay.style.display === 'none') {
                gameActive = true;
                update();
            }
            isPressing = true;
            e.preventDefault();
        };
        const handleEnd = () => {
            isPressing = false;
        };

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchend', handleEnd);

        overlay.style.display = 'block';
        statusText.innerText = "Ellie's Pastel Paraglider 🪂";
        finalScoreEl.innerText = "Klar for en magisk flytur?";
    </script>
</body>
</html>
