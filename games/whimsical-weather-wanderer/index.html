<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whimsical Weather Wanderer ✨☁️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div id="ui">

    <script src="game.js"></script>
