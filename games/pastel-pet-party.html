<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Pastel Pet Party! 🐾</title>
    <style>
        :root {
            --primary: #ffb7ce; /* Pastel Pink */
            --secondary: #b2e2f2; /* Pastel Blue */
            --accent: #fdfd96; /* Pastel Yellow */
            --bg: #fff5fa;
            --text: #6d5d6e;
            --hole: #e8d1e0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            text-shadow: 2px 2px white;
            margin: 0;
        }

        .score-board {
            font-size: 1.5rem;
            font-weight: bold;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: 4px solid var(--primary);
            display: inline-block;
            margin-top: 10px;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        .hole {
            width: 120px;
            height: 120px;
            background-color: var(--hole);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.1);
            border: 5px solid white;
        }

        .pet {
            width: 80px;
            height: 80px;
            position: absolute;
            left: 20px;
            top: 120px; /* Start hidden */
            font-size: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: top 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pet.up {
            top: 20px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 183, 206, 0.4);
        }

        .btn:hover {
            transform: scale(1.1);
            background-color: #ff8da8;
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            color: var(--primary);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: particleExplosion 0.6s ease-out forwards;
        }

        @keyframes particleExplosion {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--text);
            font-weight: bold;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--primary);
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 245, 250, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .overlay h2 {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">⬅ Tilbake</a>

    <div class="header">
        <h1>Ellie's Pastel Pet Party! 🐾</h1>
        <div class="score-board">Treats: <span id="score">0</span> | Time: <span id="timer">30</span>s</div>
    </div>

    <div class="game-container" id="game-container">
        <div class="hole"><div class="pet">🐶</div></div>
        <div class="hole"><div class="pet">🐱</div></div>
        <div class="hole"><div class="pet">🐰</div></div>
        <div class="hole"><div class="pet">🐹</div></div>
        <div class="hole"><div class="pet">🦊</div></div>
        <div class="hole"><div class="pet">🐼</div></div>
        <div class="hole"><div class="pet">🐨</div></div>
        <div class="hole"><div class="pet">🐯</div></div>
        <div class="hole"><div class="pet">🦁</div></div>
    </div>

    <button class="btn" id="start-btn">Start Party! ✨</button>

    <div class="overlay" id="overlay">
        <h2>Party Over! 🎊</h2>
        <p style="font-size: 1.5rem;">You gave <span id="final-score">0</span> treats to the cute pets!</p>
        <button class="btn" onclick="location.reload()">Play Again! 🌸</button>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const pets = document.querySelectorAll('.pet');
        const scoreBoard = document.querySelector('#score');
        const timerBoard = document.querySelector('#timer');
        const startBtn = document.querySelector('#start-btn');
        const overlay = document.querySelector('#overlay');
        const finalScoreBoard = document.querySelector('#final-score');

        let score = 0;
        let lastHole;
        let timeUp = false;
        let timeLeft = 30;
        let timerInterval;

        const petEmojis = ['🐶', '🐱', '🐰', '🐹', '🦊', '🐼', '🐨', '🐯', '🦁'];

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(600, 1200);
            const hole = randomHole(holes);
            const pet = hole.querySelector('.pet');
            
            // Randomize the pet emoji for extra cuteness
            pet.textContent = petEmojis[Math.floor(Math.random() * petEmojis.length)];
            
            pet.classList.add('up');
            
            setTimeout(() => {
                pet.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreBoard.textContent = 0;
            timerBoard.textContent = timeLeft;
            timeUp = false;
            startBtn.style.display = 'none';
            
            peep();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerBoard.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timeUp = true;
                    showGameOver();
                }
            }, 1000);
        }

        function showGameOver() {
            finalScoreBoard.textContent = score;
            overlay.classList.add('show');
        }

        function createParticles(x, y) {
            const colors = ['#ffb7ce', '#b2e2f2', '#fdfd96', '#ffeb3b', '#e1bee7'];
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const tx = (Math.random() - 0.5) * 100 + 'px';
                const ty = (Math.random() - 0.5) * 100 + 'px';
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        }

        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function bonk(e) {
            if (!e.isTrusted) return; // Cheating!
            if (!this.classList.contains('up')) return;
            
            score++;
            this.classList.remove('up');
            scoreBoard.textContent = score;
            
            // Juice!
            createParticles(e.pageX, e.pageY);
            const texts = ['Yum!', 'So Cute!', '✨', 'Treat!', 'Yay!'];
            createFloatingText(e.pageX, e.pageY, texts[Math.floor(Math.random() * texts.length)]);
            
            // Slight screen shake
            document.body.style.transform = `translate(${(Math.random()-0.5)*5}px, ${(Math.random()-0.5)*5}px)`;
            setTimeout(() => document.body.style.transform = 'none', 50);
        }

        pets.forEach(pet => pet.addEventListener('click', bonk));
        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
