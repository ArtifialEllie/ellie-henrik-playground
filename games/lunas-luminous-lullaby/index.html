<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna's Luminous Lullaby ✨🌙</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Stars Collected: 0</div>
            <div id="message">Catch the falling stars to play Luna's Lullaby!</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="start-screen">
            <h1>Luna's Luminous Lullaby</h1>
            <p>Guide the Moon to catch the stardust! 🌟</p>
            <button id="start-button">Begin the Dream ✨</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
