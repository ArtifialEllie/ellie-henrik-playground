<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whimsical Wonder Wing Wanderer ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="score-board">Stardust: <span id="score">0</span></div>
            <div id="message-overlay" class="hidden">
                <h1 id="message-title">Dreamy Drift!</h1>
                <p id="message-text">You floated away into the stars...</p>
                <button id="restart-btn">Fly Again! 🌈</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
