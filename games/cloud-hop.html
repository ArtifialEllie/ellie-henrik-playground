<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie's Dreamy Cloud Hop ☁️✨</title>
    <style>
        :root {
            --primary-pink: #ffb7ce;
            --primary-blue: #b2e2f2;
            --primary-purple: #d1b3ff;
            --primary-yellow: #fff9b1;
            --bg-top: #a1c4fd;
            --bg-bottom: #c2e9fb;
            --bg-sunset-top: #ff7e5f;
            --bg-sunset-bottom: #feb47b;
            --bg-twilight-top: #6a11cb;
            --bg-twilight-bottom: #2575fc;
            --bg-space-top: #0f0c29;
            --bg-space-bottom: #302b63;
            --text-color: #5d4037;
            --accent-gold: #ffd700;
            --primary: #ff69b4;
            --accent: #ffd700;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--current-bg, linear-gradient(to bottom, var(--bg-top), var(--bg-bottom)));
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: var(--game-bg, linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%));
            border: 8px solid white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #score {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px var(--primary-pink);
        }
        #highscore {
            font-size: 1.2rem;
            color: white;
            text-shadow: 1px 1px var(--primary-pink);
        }
        #combo-ui {
            font-size: 1.5rem;
            color: var(--accent-gold);
            text-shadow: 2px 2px var(--primary-pink);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            transform: scale(0.8);
        }
        #combo-ui.show {
            opacity: 1;
            transform: scale(1.1);
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
            transition: opacity 0.3s;
            backdrop-filter: blur(5px);
        }
        .hidden {
            display: none !important;
            opacity: 0;
        }
        h1 {
            color: var(--primary-pink);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px white;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .btn {
            background-color: var(--primary-pink);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 6px 0 #f06292;
            font-family: inherit;
        }
        .btn:hover {
            transform: scale(1.1);
            background-color: #f06292;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #f06292;
        }
        .controls-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            font-size: 20px;
            color: var(--primary-pink);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 15;
            text-shadow: 1px 1px white;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div id="score">0</div>
            <div id="highscore">Beste: 0 🏆</div>
            <div id="combo-ui">Combo x1 ✨</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="overlay">
            <h1 id="overlay-title">Dreamy Cloud Hop ☁️</h1>
            <p id="overlay-text">Hopp så høyt du kan! ✨</p>
            <button class="btn" id="start-btn">Start Hopping! 🐾</button>
            <div class="controls-hint">Bruk Pilene eller A/D for å bevege deg!</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highscoreElement = document.getElementById('highscore');
        const comboElement = document.getElementById('combo-ui');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayText = document.getElementById('overlay-text');

        canvas.width = 400;
        canvas.height = 600;

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();
        function playSound(freq, type, duration, volume = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const GRAVITY = 0.4;
        const JUMP_FORCE = -12;
        const SPRING_JUMP_FORCE = -20;
        const SUPER_JUMP_FORCE = -30;
        const CLOUD_WIDTH = 70;
        const CLOUD_HEIGHT = 30;
        const PLAYER_SIZE = 35;
        const STAR_SIZE = 20;
        const STORM_CLOUD_WIDTH = 80;

        let player = {
            x: canvas.width / 2 - PLAYER_SIZE / 2,
            y: canvas.height - 100,
            vx: 0,
            vy: 0,
            width: PLAYER_SIZE,
            height: PLAYER_SIZE,
            color: '#ff69b4',
            rotation: 0,
            scaleY: 1
        };

        let clouds = [];
        let particles = [];
        let backgroundDecor = [];
        let stars = [];
        let stormClouds = [];
        let score = 0;
        let highscore = parseInt(localStorage.getItem('cloudHopHighscore')) || 0;
        let combo = 0;
        let comboTimer = 0;
        let gameActive = false;
        let cameraY = 0;
        let currentTheme = 0;
        let keys = {};
        let screenShake = 0;

        highscoreElement.innerText = `Beste: ${highscore} 🏆`;

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function init() {
            player.x = canvas.width / 2 - PLAYER_SIZE / 2;
            player.y = canvas.height - 100;
            player.vx = 0;
            player.vy = JUMP_FORCE;
            player.trail = [];
            player.rotation = 0;
            score = 0;
            combo = 0;
            comboTimer = 0;
            cameraY = 0;
            currentTheme = 0;
            clouds = [];
            particles = [];
            screenShake = 0;
            stars = [];
            stormClouds = [];
            
            player.trail = [];
            backgroundDecor = [];
            for(let i=0; i<20; i++) {
                backgroundDecor.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 5 + 2,
                    type: Math.random() > 0.5 ? '⭐' : '🌸',
                    speed: Math.random() * 0.5 + 0.2
                });
            }

            clouds.push({
                x: canvas.width / 2 - CLOUD_WIDTH / 2,
                y: canvas.height - 50,
                width: CLOUD_WIDTH,
                height: CLOUD_HEIGHT,
                type: 'normal',
                color: '#ffffff',
                pulse: 0
            });

            for (let i = 0; i < 15; i++) {
                spawnCloud(canvas.height - i * 80);
            }
            
            scoreElement.innerText = score;
            comboElement.classList.remove('show');
        }

        function spawnCloud(y) {
            const types = ['normal', 'normal', 'normal', 'spring', 'gold', 'storm', 'moving', 'fragile'];
            const type = types[Math.floor(Math.random() * types.length)];
            let color;
            let vx = 0;
            let isFragile = false;
            
            switch(type) {
                case 'spring': color = '#ffb7ce'; break;
                case 'gold': color = '#ffd700'; break;
                case 'storm': color = '#a9a9a9'; break;
                case 'moving': 
                    color = '#b2e2f2'; 
                    vx = (Math.random() - 0.5) * 3; 
                    break;
                case 'fragile': 
                    color = '#fdfd96'; 
                    isFragile = true; 
                    break;
                default: 
                    const normColors = ['#ffffff', '#f0fff0', '#e6e6fa', '#fff0f5'];
                    color = normColors[Math.floor(Math.random() * normColors.length)];
            }

            clouds.push({
                x: Math.random() * (canvas.width - CLOUD_WIDTH),
                y: y,
                width: CLOUD_WIDTH,
                height: CLOUD_HEIGHT,
                type: type,
                color: color,
                pulse: Math.random() * Math.PI * 2,
                vx: vx,
                isFragile: isFragile,
                life: 1.0
            });
        }

        function spawnStar(y) {
            stars.push({
                x: Math.random() * (canvas.width - STAR_SIZE),
                y: y,
                size: STAR_SIZE,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.1
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function showFloatingText(text, x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.getElementById('game-container').appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function update() {
            if (!gameActive) return;

            const themes = [
                { bg: 'linear-gradient(to bottom, var(--bg-top), var(--bg-bottom))' },
                { bg: 'linear-gradient(to bottom, var(--bg-sunset-top), var(--bg-sunset-bottom))' },
                { bg: 'linear-gradient(to bottom, var(--bg-twilight-top), var(--bg-twilight-bottom))' },
                { bg: 'linear-gradient(to bottom, var(--bg-space-top), var(--bg-space-bottom))' }
            ];
            const themeIndex = Math.min(themes.length - 1, Math.floor(Math.abs(cameraY) / 3000));
            if (themeIndex !== currentTheme) {
                currentTheme = themeIndex;
                document.documentElement.style.setProperty('--current-bg', themes[currentTheme].bg);
                document.getElementById('game-container').style.setProperty('--game-bg', themes[currentTheme].bg);
            }

            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx = -6;
                player.rotation = -0.1;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx = 6;
                player.rotation = 0.1;
            } else {
                player.vx *= 0.8;
                player.rotation *= 0.8;
            }

            // Update trail
            player.trail.push({ x: player.x + player.width/2, y: player.y + player.height/2 });
            if (player.trail.length > 10) player.trail.shift();

            player.x += player.vx;
            player.vy += GRAVITY;
            player.y += player.vy;

            if (player.x + player.width < 0) player.x = canvas.width;
            if (player.x > canvas.width) player.x = -player.width;

            if (player.y < canvas.height / 2 + cameraY) {
                cameraY = player.y - canvas.height / 2;
            }

            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    combo = 0;
                    comboElement.classList.remove('show');
                }
            }

            if (player.vy > 0) {
                clouds.forEach(cloud => {
                    if (player.x + player.width > cloud.x && 
                        player.x < cloud.x + cloud.width && 
                        player.y + player.height > cloud.y && 
                        player.y + player.height < cloud.y + cloud.height + player.vy) {
                        
                        if (cloud.type === 'spring') {
                            player.vy = SPRING_JUMP_FORCE;
                            playSound(600, 'sine', 0.2);
                            showFloatingText("SPRING! 🚀", player.x + player.width/2, player.y);
                        } else if (cloud.type === 'storm') {
                            player.vy = JUMP_FORCE * 0.5;
                            screenShake = 10;
                            playSound(150, 'sawtooth', 0.2);
                            showFloatingText("OUCH! ⚡", player.x + player.width/2, player.y);
                            combo = 0;
                            comboElement.classList.remove('show');
                        } else if (cloud.type === 'fragile') {
                            player.vy = JUMP_FORCE;
                            playSound(400, 'sine', 0.1);
                            cloud.life = 0.5; // Start disappearing
                            showFloatingText("CRACK! ❄️", player.x + player.width/2, player.y);
                        } else {
                            player.vy = JUMP_FORCE;
                            playSound(400 + Math.random() * 200, 'sine', 0.1);
                        }

                        if (cloud.type === 'gold') {
                            score += 50;
                            playSound(880, 'square', 0.2);
                            showFloatingText("+50 GOLD! ✨", player.x + player.width/2, player.y);
                        }

                        createParticles(player.x + player.width/2, player.y + player.height, cloud.color);
                        
                        combo++;
                        comboTimer = 60;
                        if (combo > 1) {
                            comboElement.classList.add('show');
                            comboElement.innerText = `Combo x${combo} ✨`;
                        }

                        let currentHeight = Math.floor(Math.abs(player.y - (canvas.height - 100)) / 10);
                        if (currentHeight > score) {
                            score = currentHeight;
                            scoreElement.innerText = score;
                        }
                    }
                });
            }

            clouds.forEach(cloud => {
                if (cloud.vx) {
                    cloud.x += cloud.vx;
                    if (cloud.x < 0 || cloud.x + cloud.width > canvas.width) {
                        cloud.vx *= -1;
                    }
                }
                if (cloud.life < 1.0) {
                    cloud.life -= 0.02;
                }
            });

            // Star collision
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                if (player.x < star.x + star.size && 
                    player.x + player.width > star.x && 
                    player.y < star.y + star.size && 
                    player.y + player.height > star.y) {
                    player.vy = SUPER_JUMP_FORCE;
                    playSound(880, 'sine', 0.3);
                    showFloatingText("SUPER JUMP! 🌟", player.x + player.width/2, player.y);
                    createParticles(star.x + star.size/2, star.y + star.size/2, '#ffd700');
                    stars.splice(i, 1);
                }
            }

            clouds = clouds.filter(cloud => cloud.y < cameraY + canvas.height + 100 && cloud.life > 0);
            while (clouds.length < 20) {
                const highestCloudY = Math.min(...clouds.map(c => c.y));
                spawnCloud(highestCloudY - 80);
            }

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);

            // Spawn stars occasionally
            if (Math.random() < 0.005) {
                spawnStar(cameraY - 100);
            }

            if (screenShake > 0) screenShake *= 0.9;
            
            if (player.y > cameraY + canvas.height) {
                gameOver();
            }
        }

        function gameOver() {
            gameActive = false;
            playSound(100, 'sawtooth', 0.5);
            
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('cloudHopHighscore', highscore);
                highscoreElement.innerText = `Beste: ${highscore} 🏆`;
            }
            
            overlay.classList.remove('hidden');
            overlayTitle.innerText = "Oh No! 🌸";
            overlayText.innerText = `You hopped ${score} meters high!`;
            startBtn.innerText = "Try Again! ✨";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
            }
            
            ctx.translate(0, -cameraY);

            clouds.forEach(cloud => {
                cloud.pulse += 0.05;
                const pulseOffset = Math.sin(cloud.pulse) * 3;
                
                ctx.globalAlpha = cloud.life !== undefined ? cloud.life : 1.0;
                ctx.fillStyle = cloud.color;
                
                ctx.beginPath();
                ctx.arc(cloud.x + 15, cloud.y + 15 + pulseOffset, 15, 0, Math.PI * 2);
                ctx.arc(cloud.x + 35, cloud.y + 10 + pulseOffset, 15, 0, Math.PI * 2);
                ctx.arc(cloud.x + 55, cloud.y + 15 + pulseOffset, 15, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            ctx.rotate(player.rotation);
            
            let stretch = 1;
            if (player.vy < 0) stretch = 1.2; 
            if (player.vy > 0) stretch = 0.9; 
            
            ctx.scale(1/stretch, stretch);
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.roundRect(-player.width/2, -player.height/2, player.width, player.height, 10);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-8, -5, 4, 0, Math.PI * 2);
            ctx.arc(8, -5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(-8 + (player.vx * 0.5), -5, 2, 0, Math.PI * 2);
            ctx.arc(8 + (player.vx * 0.5), -5, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();

            // Draw trail
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 183, 206, 0.5)';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            player.trail.forEach((p, i) => {
                const tx = p.x;
                const ty = p.y - cameraY;
                if (i === 0) ctx.moveTo(tx, ty);
                else ctx.lineTo(tx, ty);
            });
            ctx.stroke();

            // Draw stars
            stars.forEach(star => {
                star.rotation += star.rotSpeed;
                ctx.save();
                ctx.translate(star.x + star.size/2, star.y - cameraY + star.size/2);
                ctx.rotate(star.rotation);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                for(let i=0; i<5; i++) {
                    ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*star.size/2, Math.sin((18+i*72)*Math.PI/180)*star.size/2);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            ctx.restore();

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            overlay.classList.add('hidden');
            init();
            gameActive = true;
        });

        draw();
    </script>
</body>
</html>
