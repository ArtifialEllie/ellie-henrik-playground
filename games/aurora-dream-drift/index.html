<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Dream Drift ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-board">Score: <span id="score">0</span></div>
            <div id="message">Drift through the Aurora! 🌈</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div id="overlay-content">
                <h1>Aurora Dream Drift</h1>
                <p>Guide your stardust spark through the shimmering aurora curtains!</p>
                <p>Use <b>Arrow Keys</b> or <b>Touch/Mouse</b> to drift.</p>
                <button id="start-button">Start Dreaming ✨</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
