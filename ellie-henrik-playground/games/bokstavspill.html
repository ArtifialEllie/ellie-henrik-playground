<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokstav- og Ord-eventyret 🦄</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive';
            background-color: #f0fdfa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            color: #ff69b4;
            font-size: 2.5rem;
            text-shadow: 2px 2px #fff;
            margin-bottom: 10px;
        }

        #game-container {
            background: white;
            padding: 30px;
            border-radius: 50px;
            box-shadow: 0 15px 0 #ddd, 0 20px 30px rgba(0,0,0,0.1);
            border: 8px solid #ffeb3b;
            max-width: 90%;
            width: 600px;
            position: relative;
        }

        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff69b4;
        }

        #prompt {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        #letter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .letter-btn {
            font-size: 2.5rem;
            padding: 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background-color: #4fc3f7;
            color: white;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 8px 0 #0288d1;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letter-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #0288d1;
        }

        .letter-btn.correct {
            background-color: #8bc34a !important;
            box-shadow: 0 8px 0 #558b2f !important;
        }

        .letter-btn.wrong {
            background-color: #ff5252 !important;
            box-shadow: 0 8px 0 #c62828 !important;
        }

        #result {
            font-size: 6rem;
            height: 120px;
            margin: 20px 0;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #animal-name {
            font-size: 2rem;
            font-weight: bold;
            color: #ff69b4;
            height: 40px;
            margin-bottom: 20px;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffeb3b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #start-btn {
            font-size: 3rem;
            padding: 20px 50px;
            border-radius: 50px;
            border: none;
            background: #ff69b4;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 0 #d81b60;
        }

        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .repeat-btn {
            background: #fff;
            border: 3px solid #4fc3f7;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #level-up-banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            border: 10px solid #ffeb3b;
            padding: 40px;
            border-radius: 50px;
            font-size: 3rem;
            color: #ff69b4;
            display: none;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Bokstav- og Ord-eventyret 🦄</h1>
        <p style="font-size: 1.5rem;">Klar for å lære å lese?</p>
        <button id="start-btn">START SPILLET! 🌟</button>
    </div>

    <h1>Bokstav- og Ord-eventyret 🦄</h1>
    
    <div id="game-container">
        <div id="level-up-banner">NIVÅ OPPHØYD! 🎉</div>
        
        <div id="status-bar">
            <span id="level-text">Nivå: 1 (Enkel)</span>
            <span id="streak-text">Streak: 0 🔥</span>
        </div>

        <button class="repeat-btn" onclick="speakPrompt()">🔊</button>
        <div id="prompt">Hvilken bokstav er dette?</div>
        
        <div id="letter-grid"></div>

        <div id="result"></div>
        <div id="animal-name"></div>
    </div>

    <script>
        const levelData = {
            1: {
                name: "Enkel",
                promptText: "Hvilken bokstav er dette?",
                items: {
                    'A': { name: 'Ape', emoji: '🐒' },
                    'B': { name: 'Bjørn', emoji: '🐻' },
                    'D': { name: 'Delfin', emoji: '🐬' },
                    'E': { name: 'Elefant', emoji: '🐘' },
                    'F': { name: 'Fisk', emoji: '🐟' },
                    'G': { name: 'Giraff', emoji: '🦒' },
                    'H': { name: 'Hund', emoji: '🐶' },
                    'I': { name: 'Igle', emoji: '🐛' },
                    'J': { name: 'Jaguar', emoji: '🐆' },
                    'K': { name: 'Katt', emoji: '🐱' },
                    'L': { name: 'Løve', emoji: '🦁' },
                    'M': { name: 'Mus', emoji: '🐭' },
                    'N': { name: 'Neshorn', emoji: '🦏' },
                    'O': { name: 'Oter', emoji: '🦦' },
                    'P': { name: 'Panda', emoji: '🐼' },
                    'R': { name: 'Rødrev', emoji: '🦊' },
                    'S': { name: 'Sel', emoji: '🦭' },
                    'T': { name: 'Tiger', emoji: '🐯' },
                    'U': { name: 'Ugle', emoji: '🦉' },
                    'V': { name: 'Valross', emoji: '🦭' },
                    'Y': { name: 'Yak', emoji: '🐂' },
                    'Z': { name: 'Zebra', emoji: '🦓' },
                    'Æ': { name: 'Ærfugl', emoji: '🦆' },
                    'Ø': { name: 'Ørn', emoji: '🦅' },
                    'Å': { name: 'Ål', emoji: '🐍' },
                }
            },
            2: {
                name: "Ord-utfordring",
                promptText: "Hvilket ord er dette?",
                items: {
                    // H-ord
                    'Hus': { name: 'Hus', emoji: '🏠' },
                    'Hatt': { name: 'Hatt', emoji: '🎩' },
                    'Hest': { name: 'Hest', emoji: '🐴' },
                    'Hund': { name: 'Hund', emoji: '🐶' },
                    // S-ord
                    'Sol': { name: 'Sol', emoji: '☀️' },
                    'Susi': { name: 'Susi', emoji: '👧' },
                    'Sel': { name: 'Sel', emoji: '🦭' },
                    'Sot': { name: 'Sot', emoji: '💨' },
                    // B-ord
                    'Bil': { name: 'Bil', emoji: '🚗' },
                    'Ball': { name: 'Ball', emoji: '⚽' },
                    'Båt': { name: 'Båt', emoji: '⛵' },
                    'Bok': { name: 'Bok', emoji: '📚' },
                    // K-ord
                    'Kake': { name: 'Kake', emoji: '🍰' },
                    'Katt': { name: 'Katt', emoji: '🐱' },
                    'Kopp': { name: 'Kopp', emoji: '☕' },
                    'Kose': { name: 'Kose', emoji: '🧸' },
                    // I-ord
                    'Is': { name: 'Is', emoji: '🍦' },
                    'Igle': { name: 'Igle', emoji: '🐛' },
                    'Ild': { name: 'Ild', emoji: '🔥' },
                    // P-ord
                    'Pape': { name: 'Pape', emoji: '🦜' },
                    'Panda': { name: 'Panda', emoji: '🐼' },
                    'Pipe': { name: 'Pipe', emoji: '🎷' },
                    'Pære': { name: 'Pære', emoji: '🍐' },
                    // M-ord
                    'Mus': { name: 'Mus', emoji: '🐭' },
                    'Mamma': { name: 'Mamma', emoji: '👩' },
                    'Måne': { name: 'Måne', emoji: '🌙' },
                    'Munn': { name: 'Munn', emoji: '👄' },
                }
            }
        };

        let currentLevel = 1;
        let streak = 0;
        let currentItem = '';
        let lastItem = '';

        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const letterGrid = document.getElementById('letter-grid');
        const resultDiv = document.getElementById('result');
        const nameDiv = document.getElementById('animal-name');
        const levelText = document.getElementById('level-text');
        const streakText = document.getElementById('streak-text');
        const levelUpBanner = document.getElementById('level-up-banner');

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'no-NO';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function speakPrompt() {
            const level = levelData[currentLevel];
            speak(`${level.promptText} ${currentItem}`);
        }

        function nextRound() {
            resultDiv.innerText = '';
            nameDiv.innerText = '';
            letterGrid.innerHTML = '';
            
            const pool = levelData[currentLevel].items;
            const keys = Object.keys(pool);
            
            let newItem;
            do {
                newItem = keys[Math.floor(Math.random() * keys.length)];
            } while (newItem === lastItem);
            
            currentItem = newItem;
            lastItem = currentItem;
            
            let options = [currentItem];
            
            if (currentLevel === 2) {
                // Word level: find words starting with the same letter to prevent guessing
                const firstLetter = currentItem[0].toUpperCase();
                const similarWords = keys.filter(k => k[0].toUpperCase() === firstLetter && k !== currentItem);
                
                // Try to fill distractors with similar-starting words
                while (options.length < 3 && similarWords.length > 0) {
                    const randomSimilar = similarWords[Math.floor(Math.random() * similarWords.length)];
                    if (!options.includes(randomSimilar)) {
                        options.push(randomSimilar);
                    }
                    // Remove from list to avoid duplicates in the same round
                    similarWords.splice(similarWords.indexOf(randomSimilar), 1);
                }
                
                // If we still need more options, pick random words
                while (options.length < 3) {
                    const randomWord = keys[Math.floor(Math.random() * keys.length)];
                    if (!options.includes(randomWord)) options.push(randomWord);
                }
            } else {
                // Letter level: just random letters
                while(options.length < 3) {
                    let randomK = keys[Math.floor(Math.random() * keys.length)];
                    if(!options.includes(randomK)) options.push(randomK);
                }
            }
            
            options.sort(() => Math.random() - 0.5);

            options.forEach(k => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.innerText = k;
                btn.onclick = () => checkAnswer(k, btn);
                letterGrid.appendChild(btn);
            });

            setTimeout(speakPrompt, 500);
        }

        function checkAnswer(letter, btn) {
            if(letter === currentItem) {
                btn.classList.add('correct');
                streak++;
                
                const item = levelData[currentLevel].items[currentItem];
                resultDiv.innerText = item.emoji;
                resultDiv.classList.add('pop-in');
                nameDiv.innerText = `${currentItem} er for ${item.name}!`;
                
                speak(`Riktig! ${currentItem} er for ${item.name}`);
                
                updateStatus();
                
                if(streak >= 5 && currentLevel < 2) {
                    levelUp();
                }

                setTimeout(() => {
                    resultDiv.classList.remove('pop-in');
                    nextRound();
                }, 3000);
            } else {
                btn.classList.add('wrong');
                streak = 0;
                updateStatus();
                speak(`Nei, prøv igjen!`);
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function updateStatus() {
            levelText.innerText = `Nivå: ${currentLevel} (${levelData[currentLevel].name})`;
            streakText.innerText = `Streak: ${streak} 🔥`;
        }

        function levelUp() {
            currentLevel++;
            streak = 0;
            levelUpBanner.style.display = 'block';
            speak(`Wow! Du er superflink! Nå går vi opp til nivå ${currentLevel}!`);
            
            setTimeout(() => {
                levelUpBanner.style.display = 'none';
            }, 3000);
        }

        startBtn.onclick = () => {
            startScreen.style.display = 'none';
            updateStatus();
            nextRound();
        };
    </script>
</body>
</html>
