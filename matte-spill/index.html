<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhjørningens Matte-Eventyr 🦄</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            background-color: #ffeef8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #ff4fb1;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 5px solid #ffb6c1;
            max-width: 500px;
            width: 90%;
        }
        h1 { font-size: 2rem; margin-bottom: 20px; }
        .equation {
            font-size: 3rem;
            margin: 20px 0;
            font-weight: bold;
        }
        .visuals {
            font-size: 2rem;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        input {
            font-size: 2rem;
            width: 80px;
            text-align: center;
            border: 3px solid #ffb6c1;
            border-radius: 15px;
            padding: 10px;
            outline: none;
        }
        button {
            font-size: 1.5rem;
            background-color: #ff85c1;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 10px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.1); background-color: #ff69b4; }
        #feedback {
            font-size: 1.5rem;
            margin-top: 20px;
            height: 30px;
        }
        .star { display: inline-block; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>🦄 Matte-Eventyr 🌈</h1>
        <div id="visuals" class="visuals"></div>
        <div class="equation">
            <span id="num1">0</span> + <span id="num2">0</span> = 
            <input type="number" id="answer" autofocus>
        </div>
        <button onclick="checkAnswer()">Sjekk!</button>
        <div id="feedback"></div>
    </div>

    <script>
        let n1, n2, result;

        function generateProblem() {
            n1 = Math.floor(Math.random() * 6) + 1; // 1-6
            n2 = Math.floor(Math.random() * 5) + 1; // 1-5 (keep total <= 11)
            result = n1 + n2;
            
            document.getElementById('num1').innerText = n1;
            document.getElementById('num2').innerText = n2;
            document.getElementById('answer').value = '';
            document.getElementById('feedback').innerText = '';
            
            const visuals = document.getElementById('visuals');
            visuals.innerHTML = '';
            
            // Create stars for n1
            for(let i=0; i<n1; i++) {
                visuals.innerHTML += '<span class="star">🌟</span>';
            }
            visuals.innerHTML += '<span style="margin: 0 15px; font-weight: bold;">+</span>';
            // Create stars for n2
            for(let i=0; i<n2; i++) {
                visuals.innerHTML += '<span class="star">🌟</span>';
            }
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const feedback = document.getElementById('feedback');
            
            if (userAnswer === result) {
                feedback.innerHTML = "Kjempebra! 🎉🦄✨";
                feedback.style.color = "green";
                setTimeout(generateProblem, 2000);
            } else {
                feedback.innerHTML = "Nesten! Prøv igjen! ❤️";
                feedback.style.color = "orange";
            }
        }

        // Allow "Enter" key to submit
        document.getElementById('answer').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        generateProblem();
    </script>
</body>
</html>
